<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Hyein Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,500&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body,input,button{
    font-family:'Playfair Display','Noto Serif SC',serif;
    overflow:hidden;
}

/* 背景 */
.bg{
    position:fixed;
    width:100%;
    height:100vh;
    background:#d9c6ea;
}

.bg::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:radial-gradient(circle at 50% 40%, rgba(255,255,255,0.3), transparent 70%);
}

/* 波点 */
.dots{
    position:fixed;
    width:100%;
    height:100%;
    pointer-events:none;
}

.dots::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:
    radial-gradient(circle, rgba(255,255,255,0.95) 9px, transparent 10px);
    background-size:80px 80px;
    animation:breath1 5s ease-in-out infinite alternate;
}

.dots::after{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    transform:translate(40px,40px);
    background:
    radial-gradient(circle, rgba(255,255,255,0.85) 8px, transparent 9px);
    background-size:80px 80px;
    animation:breath2 6s ease-in-out infinite alternate;
}

@keyframes breath1{
    from{opacity:0.5;}
    to{opacity:1;}
}
@keyframes breath2{
    from{opacity:0.3;}
    to{opacity:0.9;}
}

/* 页面 */
.page{
    position:fixed;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    pointer-events:none;
    transition:0.6s;
    padding:20px;
}
.page.active{opacity:1;pointer-events:auto;}

/* 封面 */
.cover{
    width:100vw;
    height:100vh;
    object-fit:cover;
}

/* 标题 */
.title{
    font-size:60px;
    color:#caa6ff;
}

/* 输入 */
input{
    padding:18px;
    border-radius:20px;
    border:none;
    width:320px;
    text-align:center;
    font-size:20px;
    margin-top:20px;
    background:rgba(255,255,255,0.6);
}

/* 按钮 */
button{
    margin-top:20px;
    padding:14px 38px;
    border:none;
    background:rgba(200,160,255,0.6);
    color:#fff;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
    font-size:18px;
}
button:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px rgba(180,120,255,0.6);
}

/* 信封 */
.envelope{
    width:520px;
    height:300px;
    position:relative;
    cursor:pointer;
}

.flap{
    position:absolute;
    width:100%;height:100%;
    background:#e2c6ff;
    clip-path:polygon(0 0,100% 0,50% 65%);
    transform-origin:top;
    transition:0.5s;
}

.envelope.open .flap{
    transform:rotateX(180deg);
}

.body{
    position:absolute;
    width:100%;height:100%;
    background:white;
    border-radius:14px;
}

/* 信纸（不滚动 + 排版优化） */
.letter{
    width:94vw;
    height:88vh;
    max-width:none;

    background:rgba(255,255,255,0.65);
    backdrop-filter:blur(12px);
    border-radius:24px;

    padding:40px 50px;

    font-size:20px;
    line-height:2.3;

    display:flex;
    flex-direction:column;
    justify-content:center;
}

/* ✅ 段落排版优化 */
.letter p{
    text-indent:2em;
    margin-bottom:12px;
}

.letter p:first-child{
    text-indent:0;
}

/* 卡片 */
.card{
    width:92vw;
    max-width:600px;

    padding:40px;

    background:rgba(255,255,255,0.55);
    backdrop-filter:blur(18px);
    border-radius:24px;

    text-align:center;
    font-size:24px;
    line-height:2.4;
}

/* 地图 */
.map{
    display:inline-block;
    padding:10px 22px;
    border-radius:20px;
    color:#8c5cff;
    cursor:pointer;
    transition:0.3s;
}
.map:hover{
    box-shadow:0 0 15px rgba(180,120,255,0.6);
}

/* 爱心 */
.heart{
    position:fixed;
    animation:fly 1.8s ease-out forwards;
}
@keyframes fly{
    to{transform:translateY(-150px);opacity:0;}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="dots"></div>

<audio id="music" src="music.mp3" loop></audio>

<!-- 封面 -->
<div class="page active" id="p1" onclick="nextPage()">
<img src="cover.jpg" class="cover">
</div>

<!-- 输入 -->
<div class="page" id="p2">
<div class="title">Hyein Invitation</div>
<input id="name" placeholder="Your Name">
<button onclick="go()">OK</button>
</div>

<!-- 信封 -->
<div class="page" id="p3">
<div class="envelope" onclick="openEnvelope(this)">
<div class="flap"></div>
<div class="body"></div>
</div>
</div>

<!-- 信件 -->
<div class="page" id="p4" onclick="nextPage()">
<div class="letter" id="letter" onclick="event.stopPropagation()"></div>
</div>

<!-- 信息 -->
<div class="page" id="p5">
<div class="card">
💜 Happy Hyein's Day 💜<br>
📅 2026.04.18<br>
📍 <span class="map" onclick="goMap()">益+coffee&tea</span><br>
Dress Code：紫色 / 波点<br>
<button onclick="confirmAttend()">我要来！</button>
</div>
</div>

<script>
let page=1;
let userName="Bunnies";
let opened=false;
let musicStarted=false;

function nextPage(){
if(!musicStarted){
let music=document.getElementById("music");
music.volume=0.4;
music.play().catch(()=>{});
musicStarted=true;
}

document.getElementById("p"+page).classList.remove("active");
page++;
document.getElementById("p"+page).classList.add("active");

updateLetter();
}

function go(){
let name=document.getElementById("name").value;
if(name) userName=name;
nextPage();
}

function openEnvelope(el){
if(!opened){
el.classList.add("open");
opened=true;
}else{
nextPage();
}
}

function updateLetter(){
document.getElementById("letter").innerHTML = `
<p>To 亲爱的 ${userName}：</p>
<p>안녕하세요~ 我是Hyein！🐹</p>
<p>好久不见，大家最近过得好吗？我最近过得超～级幸福，因为……我的生日快到啦！🎂✨</p>
<p>这一次，我想邀请我最爱的你们和我一起度过这个特别的日子！你愿意来吗？我已经开始期待看到你们的笑容了！🥺💖</p>
<p>如果没有办法来也没关系，只要为我送上祝福，我都会超级感动的！因为只要有Bunnies在，每一天都像生日一样幸福～</p>
<p>别忘了：请穿上带有紫色或波点元素的衣服哦～我们一起拍超好看的照片！</p>
<p>那我们那天见啦！不见不散！</p>
<p>사랑해요, Bunnies! 🫶🏻</p>
<p style="text-align:right;margin-top:20px;">Yours,<br>Hyein</p>
`;
}

function goMap(){
window.open("https://surl.amap.com/cYD2lgm1A9q1");
}

function confirmAttend(){
for(let i=0;i<12;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖","🍓";
h.style.left=Math.random()*100+"vw";
h.style.top="60vh";
document.body.appendChild(h);
setTimeout(()=>h.remove(),1800);
}
alert("🍓 "+userName+" 我们4.18见！");
}
</script>

</body>
</html>
