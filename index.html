<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Hyein Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,500&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body,input,button{
    font-family:'Playfair Display','Noto Serif SC',serif;
    overflow:hidden;
}

/* 💜 背景 */
.bg{
    position:fixed;
    width:100%;
    height:100vh;
    background:#cbb7db;
}

.bg::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:radial-gradient(circle at 50% 40%, rgba(255,255,255,0.35), transparent 70%);
}

/* ✨ 波点 */
.dots{
    position:fixed;
    width:100%;
    height:100%;
    pointer-events:none;
}

.dots::before,
.dots::after{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:
    radial-gradient(circle, rgba(255,255,255,0.9) 6px, transparent 7px);
    background-size:75px 75px;
}

.dots::before{
    transform:rotate(2deg) translate(-20px,-10px);
    animation:breath1 6s ease-in-out infinite alternate;
}
.dots::after{
    transform:rotate(-3deg) translate(40px,30px);
    opacity:0.7;
    animation:breath2 7s ease-in-out infinite alternate;
}

@keyframes breath1{
    from{opacity:0.6;}
    to{opacity:1;}
}
@keyframes breath2{
    from{opacity:0.4;}
    to{opacity:0.9;}
}

/* 页面 */
.page{
    position:fixed;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    pointer-events:none;
    transition:0.6s;
}
.page.active{opacity:1;pointer-events:auto;}

/* 封面 */
.cover{
    width:92%;
    max-width:600px;
    border-radius:20px;
    filter:hue-rotate(260deg) saturate(0.7) brightness(1.1);
}

/* 输入 */
input{
    padding:18px;
    border-radius:20px;
    border:none;
    width:320px;
    text-align:center;
    font-size:20px;
    margin-top:20px;
    background:rgba(255,255,255,0.6);
}

/* 按钮 */
button{
    margin-top:20px;
    padding:12px 34px;
    border:none;
    background:rgba(200,160,255,0.6);
    color:#fff;
    border-radius:30px;
}

/* ✉️ 信封 */
.envelope{
    width:420px;height:240px;
    position:relative;
    cursor:pointer;
}

/* 信纸动画 */
.paper{
    position:absolute;
    width:90%;
    height:140%;
    background:white;
    left:5%;
    top:20%;
    border-radius:10px;
    transform:translateY(80px);
    transition:1s;
    opacity:0;
}

.envelope.open .paper{
    transform:translateY(-120px);
    opacity:1;
}

.flap{
    position:absolute;
    width:100%;height:100%;
    background:#e6ccff;
    clip-path:polygon(0 0,100% 0,50% 60%);
    transform-origin:top;
    transition:0.6s;
}

.envelope.open .flap{
    transform:rotateX(180deg);
}

.body{
    position:absolute;
    width:100%;height:100%;
    background:white;
    border-radius:12px;
}

/* 📜 信件（无滚动版） */
#p4{padding:20px;}

.letter{
    width:92%;
    max-width:600px;

    background:rgba(255,255,255,0.65);
    backdrop-filter:blur(12px);
    border-radius:20px;

    padding:28px 30px;

    font-size:18px;
    line-height:2;

    overflow:hidden;
    height:auto;
    max-height:90vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
}

/* 信息卡 */
.card{
    width:90%;
    max-width:420px;
    padding:28px;
    background:rgba(255,255,255,0.55);
    backdrop-filter:blur(18px);
    border-radius:22px;
    text-align:center;
}

/* 💭 梦核碎片 */
.memory{
    position:fixed;
    pointer-events:none;
    animation:float 3s ease forwards;
    color:rgba(255,255,255,0.7);
}

@keyframes float{
    0%{opacity:0;transform:translateY(20px);}
    30%{opacity:1;}
    100%{opacity:0;transform:translateY(-40px);}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="dots"></div>

<audio id="music" src="music.mp3" loop></audio>

<!-- 封面 -->
<div class="page active" id="p1" onclick="startMusic();nextPage()">
<img src="cover.jpg" class="cover">
</div>

<!-- 输入 -->
<div class="page" id="p2">
<input id="name" placeholder="Your Name">
<button onclick="go()">OK</button>
</div>

<!-- 信封 -->
<div class="page" id="p3">
<div class="envelope" onclick="openEnvelope(this)">
<div class="paper"></div>
<div class="flap"></div>
<div class="body"></div>
</div>
</div>

<!-- 信件 -->
<div class="page" id="p4" onclick="nextPage()">
<div class="letter" id="letter"></div>
</div>

<!-- 信息 -->
<div class="page" id="p5">
<div class="card">
💜 Happy Hyein's Day 💜<br>
📅 2026.04.18<br>
📍 <span onclick="window.open('https://surl.amap.com/cYD2lgm1A9q1')">益+coffee&tea</span><br>
Dress Code：紫色 / 波点<br>
<button onclick="confirmAttend()">我要来！</button>
</div>
</div>

<script>
let page=1;
let userName="Bunnies";
let opened=false;

function startMusic(){
let m=document.getElementById("music");
m.volume=0.4;
m.play().catch(()=>{});
}

function nextPage(){
document.getElementById("p"+page).classList.remove("active");
page++;
document.getElementById("p"+page).classList.add("active");
updateLetter();
}

function go(){
let name=document.getElementById("name").value;
if(name) userName=name;
nextPage();
}

function openEnvelope(el){
if(!opened){
el.classList.add("open");
opened=true;
}else{
setTimeout(()=>nextPage(),800);
}
}

function updateLetter(){
document.getElementById("letter").innerHTML = `
<p>To 亲爱的 ${userName}：</p>
<p>안녕하세요~ 我是Hyein！🐹</p>
<p>好久不见，大家最近过得好吗？我最近过得超～级幸福，因为……我的生日快到啦！🎂✨</p>
<p>这一次，我想邀请我最爱的你们和我一起度过这个特别的日子！你愿意来吗？🥺💖</p>
<p>如果没有办法来也没关系，只要为我送上祝福，我都会超级感动的！因为只要有Bunnies在，每一天都像生日一样幸福～</p>
<p>别忘了：请穿上带有紫色或波点元素的衣服哦～我们一起拍超好看的照片！</p>
<p>那我们那天见啦！不见不散！</p>
<p>사랑해요, Bunnies! 🫶🏻</p>
<p style="text-align:right;">Yours,<br>Hyein</p>
`;
}

/* 💭 梦核碎片（强化版） */
const words=[
"Hyein","이혜인","李惠仁","NewJeans","Bunnies",
"birthday","dream","0421","2008","NJZ","forever","우리","행복"
];

setInterval(()=>{
let t=document.createElement("div");
t.className="memory";

t.innerText=words[Math.floor(Math.random()*words.length)];
t.style.left=Math.random()*90+"vw";
t.style.top=Math.random()*90+"vh";

t.style.fontSize=(16+Math.random()*22)+"px";

document.body.appendChild(t);
setTimeout(()=>t.remove(),3000);

},1500);

function confirmAttend(){
alert("💜 "+userName+" 4.18见！");
}
</script>

</body>
</html>
