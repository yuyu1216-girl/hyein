<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hyein Invitation</title>

<!-- 分享卡片 -->
<meta property="og:title" content="🐹 Hyein Invitation 🐹">
<meta property="og:description" content="✨ Open it ✨ ">
<meta property="og:image" content="./cover.jpg">

<link rel="preload" as="image" href="./cover.jpg">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* 彻底禁止微信字体放大 */
html {
    -webkit-text-size-adjust: 100% !important;
    text-size-adjust: 100% !important;
    font-size: 16px;
}
body {
    -webkit-text-size-adjust: 100% !important;
    text-size-adjust: 100% !important;
    font-size: 1rem;
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: 'Playfair Display', 'Noto Serif SC', serif;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* 背景层（雾效初始模糊+缩放） */
.bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background: #d9c6ea url('./cover.jpg') center/cover no-repeat;
    filter: blur(20px);
    transform: scale(1.1);
    transition: filter 1s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 1s ease-out;
    z-index: 0;
}
.bg::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(217, 198, 234, 0.65);
    transition: opacity 1s ease-out;
    opacity: 1;
}
/* 雾层散开后的清晰状态（由js动态添加类） */
.bg.clear {
    filter: blur(0px);
    transform: scale(1);
}
.bg.clear::after {
    opacity: 0;
}

/* 波点装饰 (用户保留，氛围用) */
.dots {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
}
.dots::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.92) 10px, transparent 11px);
    background-size: 85px 85px;
    animation: breath1 5s ease-in-out infinite alternate;
}
.dots::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    transform: translate(42px, 42px);
    background: radial-gradient(circle, rgba(255,255,240,0.8) 9px, transparent 10px);
    background-size: 85px 85px;
    animation: breath2 6s ease-in-out infinite alternate;
}
@keyframes breath1 {
    from { opacity: 0.45; }
    to { opacity: 0.9; }
}
@keyframes breath2 {
    from { opacity: 0.3; }
    to { opacity: 0.8; }
}

/* 页面容器 */
.page {
    position: fixed;
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
    z-index: 10;
    padding: 20px;
    overflow-y: auto;
}
.page.active {
    opacity: 1;
    pointer-events: auto;
}

/* 封面图 */
.cover {
    width: 92%;
    max-width: 640px;
    border-radius: 32px;
    box-shadow: 0 25px 40px rgba(0,0,0,0.2);
    opacity: 0;
    transform: scale(0.98);
    animation: coverReveal 1.2s ease forwards;
    cursor: pointer;
    transition: transform 0.3s;
}
.cover:hover {
    transform: scale(1.01);
}
@keyframes coverReveal {
    0% { opacity: 0; transform: scale(0.96); }
    100% { opacity: 1; transform: scale(1); }
}

/* 标题 */
.title {
    font-size: 3rem;
    color: #a97cff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.1);
    letter-spacing: 2px;
    margin-bottom: 0.5rem;
    text-align: center;
}

/* 输入框 */
.input-name {
    padding: 1rem 1.2rem;
    border-radius: 48px;
    border: none;
    width: 80%;
    max-width: 340px;
    text-align: center;
    font-size: 1.2rem;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(4px);
    font-family: inherit;
    box-shadow: 0 5px 12px rgba(0,0,0,0.1);
}
.input-name:focus {
    outline: none;
    background: white;
    box-shadow: 0 0 0 3px rgba(169,124,255,0.4);
}

/* 按钮 */
.btn {
    margin-top: 1.5rem;
    padding: 0.8rem 2.2rem;
    border: none;
    background: rgba(169, 124, 255, 0.85);
    color: white;
    border-radius: 60px;
    font-size: 1.2rem;
    font-weight: 500;
    cursor: pointer;
    transition: 0.25s;
    backdrop-filter: blur(4px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.btn:hover {
    transform: scale(1.03);
    background: #b77eff;
    box-shadow: 0 8px 20px rgba(140, 92, 255, 0.4);
}

/* 信封容器 */
.envelope {
    width: 90%;
    max-width: 360px;
    aspect-ratio: 360 / 220;
    position: relative;
    cursor: pointer;
    border-radius: 14px;
    background: #fff2e0;
    box-shadow: 0 20px 30px rgba(0,0,0,0.2);
    transition: transform 0.2s;
    animation: gentleFloat 3s ease-in-out infinite;
}
@keyframes gentleFloat {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
}
.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #caa6ff;
    clip-path: polygon(0 0, 100% 0, 50% 92%);
    transform-origin: top;
    transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    border-radius: 14px 14px 0 0;
    z-index: 3;
}
.body {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #fffaf2;
    border-radius: 14px;
    box-shadow: inset 0 1px 4px rgba(0,0,0,0.05);
}
.body::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, transparent 49%, rgba(0,0,0,0.03) 50%, transparent 51%),
                linear-gradient(225deg, transparent 49%, rgba(0,0,0,0.03) 50%, transparent 51%);
    pointer-events: none;
}
.envelope.open .flap {
    transform: rotateX(180deg);
}
.hint {
    margin-top: 1.5rem;
    font-size: 1rem;
    color: #a16eff;
    font-weight: 500;
    background: rgba(255,255,240,0.6);
    padding: 0.3rem 1rem;
    border-radius: 60px;
    backdrop-filter: blur(4px);
}

/* 信纸 */
.letter {
    width: 92%;
    max-width: 620px;
    background: rgba(255, 250, 245, 0.92);
    backdrop-filter: blur(6px);
    border-radius: 36px;
    padding: 2rem 2rem;
    font-size: 1.05rem;
    line-height: 1.9;
    overflow-wrap: break-word;
    word-break: break-word;
    box-shadow: 0 20px 35px rgba(0,0,0,0.15);
    border: 1px solid rgba(255,255,200,0.6);
}
.letter p {
    text-indent: 2em;
    margin-bottom: 0.8rem;
}
.letter p:first-child {
    text-indent: 0;
}
.letter p:last-child {
    margin-bottom: 0;
}

/* 卡片页 (party info) */
.card {
    width: 92%;
    max-width: 520px;
    padding: 2rem 1.8rem;
    background: rgba(255, 245, 255, 0.88);
    backdrop-filter: blur(12px);
    border-radius: 48px;
    text-align: center;
    font-size: 1.2rem;
    line-height: 2.4;
    box-shadow: 0 20px 30px rgba(0,0,0,0.2);
    border: 1px solid rgba(255,215,255,0.6);
}
.countdown-box {
    background: rgba(169, 124, 255, 0.2);
    border-radius: 60px;
    padding: 0.3rem 1rem;
    display: inline-block;
    margin: 0.6rem 0;
    font-weight: 500;
    font-size: 1rem;
}
.map-link {
    display: inline-block;
    padding: 0.4rem 1.2rem;
    border-radius: 40px;
    background: rgba(140, 92, 255, 0.2);
    color: #7b4cff;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}
.map-link:hover {
    background: rgba(140, 92, 255, 0.4);
    transform: scale(1.02);
}
.heart-fly {
    position: fixed;
    font-size: 1.8rem;
    pointer-events: none;
    z-index: 200;
    animation: flyHeart 1.4s forwards;
}
@keyframes flyHeart {
    0% {
        transform: translateY(0) scale(0.6);
        opacity: 1;
    }
    100% {
        transform: translateY(-180px) scale(1.2);
        opacity: 0;
    }
}

/* 响应式 */
@media (max-width: 550px) {
    html {
        font-size: 14px;
    }
    .title {
        font-size: 2.4rem;
    }
    .letter {
        font-size: 0.95rem;
        padding: 1.4rem;
    }
    .card {
        font-size: 1rem;
        padding: 1.4rem;
    }
    .btn {
        font-size: 1rem;
        padding: 0.6rem 1.8rem;
    }
}
</style>
</head>
<body>

<div class="bg" id="bgLayer"></div>
<div class="dots"></div>

<audio id="bgMusic" src="music.mp3" loop preload="auto"></audio>

<!-- 封面页 P1 -->
<div class="page active" id="page1">
    <img src="./cover.jpg" class="cover" alt="Hyein Invitation" onerror="this.src='https://placehold.co/600x800?text=🌸+Cover+Missing+🌸';">
</div>

<!-- 输入昵称 P2 -->
<div class="page" id="page2">
    <div class="title">Hyein Invitation</div>
    <input type="text" id="guestName" class="input-name" placeholder="Your name / nickname" autocomplete="off">
    <button class="btn" id="okNameBtn">OK</button>
</div>

<!-- 信封页 P3 -->
<div class="page" id="page3">
    <div class="envelope" id="envelopeBox">
        <div class="flap"></div>
        <div class="body"></div>
    </div>
    <div class="hint">💌 Open it 💌</div>
</div>

<!-- 信件内容 P4 -->
<div class="page" id="page4">
    <div class="letter" id="letterContent"></div>
    <div style="margin-top: 20px; font-size: 0.85rem; color: #b27eff;">✨ 轻点任意处 继续 ✨</div>
</div>

<!-- 派对详情 P5 -->
<div class="page" id="page5">
    <div class="card">
        💜 Happy Hyein's Day 💜<br>
        📅 2026.04.18 (周六)<br>
        📍 <span class="map-link" id="mapTrigger">益+ coffee & tea</span><br>
        🎀 Dress Code：紫色 / 波点元素<br>
        <div class="countdown-box" id="countdownDisplay">⏳ 计算中...</div>
        <button class="btn" id="confirmBtn" style="margin-top: 1rem;">✨ 我要来 ✨</button>
    </div>
</div>

<script>
// ---------- DOM 元素 ----------
const bgLayer = document.getElementById('bgLayer');
const pages = [document.getElementById('page1'), document.getElementById('page2'), document.getElementById('page3'), document.getElementById('page4'), document.getElementById('page5')];
let currentPageIdx = 0;        // 0-based: 0封面 1姓名 2信封 3信件 4信息
let userName = "Bunnies";
let envelopeOpened = false;
let musicPlaying = false;

// ---------- 雾层一秒散开 (封面图清晰露出) ----------
function startFogDissolve() {
    // 保证背景过渡平滑, 添加clear类去除模糊/缩放 + 半透明遮罩消失
    if (bgLayer) {
        // 强制触发重绘，立即开始过渡
        bgLayer.classList.add('clear');
    }
}

// ---------- 音乐自动播放 (兼容微信/浏览器) ----------
function initAutoPlayMusic() {
    const music = document.getElementById('bgMusic');
    if (!music) return;
    music.volume = 0.35;
    
    const tryPlay = () => {
        music.play().then(() => {
            musicPlaying = true;
        }).catch(e => {
            // 静默失败，等待用户首次交互
        });
    };
    // 微信及移动端常用交互解锁
    document.addEventListener('click', tryPlay, { once: true });
    document.addEventListener('touchstart', tryPlay, { once: true });
    document.addEventListener('WeixinJSBridgeReady', () => {
        music.play().catch(()=>{});
    });
    // 如果页面加载后很快有交互，尝试播放
    setTimeout(() => {
        if (!musicPlaying) tryPlay();
    }, 800);
}

// ---------- 页面切换 ----------
function goToPage(index) {
    if (index < 0 || index >= pages.length) return;
    // 隐藏所有页面
    pages.forEach(page => page.classList.remove('active'));
    pages[index].classList.add('active');
    currentPageIdx = index;
    
    // 特殊逻辑: 进入信件页(p4)时动态渲染最新信件内容
    if (index === 3) {
        renderLetter();
    }
    // 进入详情页(p5) 刷新倒计时
    if (index === 4) {
        updateCountdownDisplay();
    }
}

// 下一页 (通用)
function nextPage() {
    if (currentPageIdx === 0) {
        goToPage(1);
    } 
    else if (currentPageIdx === 1) {
        // 姓名输入验证
        const nameInput = document.getElementById('guestName');
        let inputName = nameInput.value.trim();
        if (inputName !== "") {
            userName = inputName;
        } else {
            userName = "Bunnies";
        }
        goToPage(2);
    }
    else if (currentPageIdx === 2) {
        // 信封页: 如果还没打开信封, 不允许翻页, 需先打开信封
        if (!envelopeOpened) {
            // 提示先打开信封
            const hintDiv = document.querySelector('#page3 .hint');
            hintDiv.style.transform = "scale(1.05)";
            hintDiv.style.transition = "0.2s";
            setTimeout(() => { hintDiv.style.transform = ""; }, 300);
            return;
        }
        goToPage(3);
    }
    else if (currentPageIdx === 3) {
        goToPage(4);
    }
    // 最后一页不再继续
}

// 渲染信件 (根据用户名)
function renderLetter() {
    const letterDiv = document.getElementById('letterContent');
    if (!letterDiv) return;
    letterDiv.innerHTML = `
        <p>To 亲爱的 ${userName}：</p>
        <p>안녕하세요~ 我是Hyein！🐹</p>
        <p>好久不见，大家最近过得好吗？我最近过得超～级幸福，因为……我的生日快到啦！🎂✨</p>
        <p>这一次，我想邀请我最爱的你们和我一起度过这个特别的日子！你愿意来吗？我已经开始期待看到你们的笑容了！🥺💖</p>
        <p>如果没有办法来也没关系，只要为我送上祝福，我都会超级感动的！因为只要有Bunnies在，每一天都像生日一样幸福～</p>
        <p>别忘了：请穿上带有紫色或波点元素的衣服哦～我们一起拍超好看的照片！</p>
        <p>那我们那天见啦！不见不散！</p>
        <p>사랑해요, Bunnies! 🫶🏻</p>
        <p style="text-align:right; margin-top:22px;">Yours,<br>Hyein 💜</p>
    `;
}

// 倒计时更新 (目标 2026.04.18)
function updateCountdownDisplay() {
    const targetDate = new Date(2026, 3, 18, 0, 0, 0); // 月份4月 => index 3
    const now = new Date();
    const diff = targetDate - now;
    const countdownEl = document.getElementById('countdownDisplay');
    if (!countdownEl) return;
    if (diff <= 0) {
        countdownEl.innerHTML = "🎉 就是今天！Hyein's Day 🎉";
        return;
    }
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (86400000)) / (3600000));
    const mins = Math.floor((diff % 3600000) / 60000);
    countdownEl.innerHTML = `⏳ 倒计时：${days}天 ${hours}小时 ${mins}分`;
}

// 定时刷新倒计时 (全局)
let countdownInterval = null;
function startCountdownTimer() {
    if (countdownInterval) clearInterval(countdownInterval);
    updateCountdownDisplay();
    countdownInterval = setInterval(() => {
        updateCountdownDisplay();
    }, 1000);
}

// 地图跳转
function openMap() {
    window.open("https://surl.amap.com/cYD2lgm1A9q1", "_blank");
}

// 爱心特效 + 确认弹窗
function confirmAttendance() {
    // 爱心雨
    for (let i = 0; i < 20; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart-fly';
        heart.innerHTML = ['💜', '💖', '🐹', '✨', '🌸', '🎀'][Math.floor(Math.random() * 6)];
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.bottom = '10vh';
        heart.style.fontSize = 1.5 + Math.random() * 1.2 + 'rem';
        heart.style.position = 'fixed';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1400);
    }
    alert(`🍓 ${userName}  💜 我们4.18见！记得穿紫色或波点哟 💜`);
}

// 信封打开逻辑
function setupEnvelope() {
    const envelope = document.getElementById('envelopeBox');
    if (!envelope) return;
    envelope.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!envelopeOpened) {
            envelope.classList.add('open');
            envelopeOpened = true;
            // 打开信封后，稍微延迟可点击提示进入下页
            const hintMsg = document.querySelector('#page3 .hint');
            if (hintMsg) hintMsg.innerHTML = "💌 信已开启 · 轻触继续 💌";
        } else {
            // 已打开，再次点击跳转下一页
            nextPage();
        }
    });
}

// 所有手动绑定事件
function bindEvents() {
    // 封面点击翻页
    const coverImg = document.querySelector('#page1 .cover');
    if (coverImg) coverImg.addEventListener('click', () => nextPage());
    
    // 确定昵称按钮
    const okBtn = document.getElementById('okNameBtn');
    if (okBtn) okBtn.addEventListener('click', () => nextPage());
    
    // 输入框按回车也可以
    const nameInput = document.getElementById('guestName');
    if (nameInput) {
        nameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') nextPage();
        });
    }
    
    // 信件页点击继续 (任意位置)
    const pageLetter = document.getElementById('page4');
    if (pageLetter) pageLetter.addEventListener('click', (e) => {
        // 防止点到内部按钮冒泡影响，直接继续
        nextPage();
    });
    
    // 地图链接
    const mapSpan = document.getElementById('mapTrigger');
    if (mapSpan) mapSpan.addEventListener('click', openMap);
    
    // 确认参加按钮
    const confirmBtn = document.getElementById('confirmBtn');
    if (confirmBtn) confirmBtn.addEventListener('click', confirmAttendance);
    
    // 额外确保信封页如果没有打开信封就试图通过其他nextPage方式，已经做了防护
}

// 背景音乐预加载辅助
function preloadAndMusic() {
    initAutoPlayMusic();
}

// 初始化整体流程，修复各种bug，雾层散开调用
window.addEventListener('load', () => {
    // 1. 修复信封交互
    setupEnvelope();
    // 2. 绑定页面事件
    bindEvents();
    // 3. 启动倒计时
    startCountdownTimer();
    // 4. 音乐自动播放尝试
    preloadAndMusic();
    // 5. 初始信件内容(以防直接跳转？但默认在封面)
    renderLetter();
    // 6. 雾层一秒散开: 让背景清晰露出封面图
    setTimeout(() => {
        startFogDissolve();
    }, 100);  // 轻微延迟确保过渡自然，封面图加载后雾层优雅散开
    // 7. 如果封面图加载失败友好占位
    const coverImgDom = document.querySelector('.cover');
    if (coverImgDom) {
        coverImgDom.addEventListener('error', () => {
            coverImgDom.src = "https://placehold.co/800x1000?text=🐹+Hyein+Party+🐹&bg=EFE0FF";
        });
    }
    
    // 额外增强: 防止部分浏览器背景模糊初始化未完全，再保险一次
    setTimeout(() => {
        if (bgLayer && !bgLayer.classList.contains('clear')) {
            bgLayer.classList.add('clear');
        }
    }, 1200);
});

// 如果用户快速点击翻页导致未定义userName的情况, 在输入页已经处理
// 修复所有潜在bug:
// - 原nextPage未定义 => 完善全局nextPage
// - 原createDots不存在 => 删除无用调用
// - 原updateLetter不存在 => renderLetter
// - 原倒计时元素缺失 => 增加countdownDisplay
// - 原p4标签未闭合 => 修复html结构
// - 原音乐自动播放策略增强
// - 信封打开逻辑二次点击可进入下一页
// - 卡片页增加倒计时实时显示
// - 雾层散开并且封面图彻底清晰, bg::after透明度降低消失, 无遮挡

// 兼容移动端触摸优化
document.querySelectorAll('.btn, .envelope, .map-link, .cover').forEach(el => {
    el.addEventListener('touchstart', (e) => {
        // 只是为了提高响应感，不做额外动作
    }, { passive: true });
});

// 确保背景图比例稳定，防止页面滚动
window.addEventListener('resize', () => {
    // 保持背景覆盖，无需额外
});

// 最后确保信件页如果因为某些情况未渲染，手动重新渲染一次
setInterval(() => {
    if (currentPageIdx === 3) {
        renderLetter();
    }
}, 500);
