<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;600&family=Noto+Serif:wght@400;600&display=swap" rel="stylesheet">

<title>Hyein Invitation</title>

<style>
body{
    margin:0;
    font-family:'Noto Sans',sans-serif;
    overflow:hidden;
    background:#d9c6ec;
}

/* 页面 */
.container{
    height:100vh;
    position:relative;
}

.page{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:0.6s;
    z-index:1;
}

.hidden{
    transform:translateY(100%);
}

/* 💜 梦核背景（乱波点） */
.bg{
    background:#d9c6ec;
    position:relative;
    overflow:hidden;
}

/* 随机波点 */
.bg::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    pointer-events:none;

    background:
    radial-gradient(circle at 10% 20%, #fff6 8px, transparent 9px),
    radial-gradient(circle at 30% 70%, #fff5 10px, transparent 11px),
    radial-gradient(circle at 60% 40%, #fff4 7px, transparent 8px),
    radial-gradient(circle at 80% 80%, #fff6 9px, transparent 10px),
    radial-gradient(circle at 50% 10%, #fff5 6px, transparent 7px),
    radial-gradient(circle at 20% 90%, #fff4 8px, transparent 9px),
    radial-gradient(circle at 75% 25%, #fff6 7px, transparent 8px);

    animation:floatDots 20s linear infinite;
}

/* 雾 */
.bg::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    pointer-events:none;
    background:rgba(255,255,255,0.15);
    filter:blur(30px);
}

@keyframes floatDots{
    from{transform:translateY(0);}
    to{transform:translateY(-80px);}
}

/* 卡片 */
.card{
    width:92%;
    max-width:460px;
    background:rgba(255,255,255,0.85);
    border-radius:24px;
    padding:28px;
    backdrop-filter:blur(12px);
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
    text-align:center;
}

/* 输入 */
.input{
    width:85%;
    padding:12px;
    border-radius:20px;
    border:1px solid #ddd;
    text-align:center;
    margin-top:10px;
}

/* 按钮 */
.btn{
    margin-top:16px;
    padding:12px;
    width:75%;
    border:none;
    border-radius:25px;
    background:linear-gradient(135deg,#8b6cff,#b9a7ff);
    color:white;
}

/* 封面 */
.cover img{
    width:85%;
    object-fit:contain;
}

/* 信件 */
.letter{
    font-family:'Noto Serif',serif;
    text-align:left;
    line-height:1.9;
    font-size:16px;
    color:#333;
}

.letter p{
    text-indent:2em;
    margin:10px 0;
}

.letter p:first-child{
    text-indent:0;
    font-weight:bold;
}

/* 信息 */
.info{
    line-height:1.8;
}

/* 自定义弹窗 */
.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.3);
}

.popup-box{
    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
}
</style>
</head>

<body>

<audio id="music" src="music.mp3" loop></audio>

<div class="container">

<!-- 输入 -->
<div class="page bg">
    <div class="card">
        <h3>💜 Bunnies Invitation 💜</h3>
        <input class="input" id="nameInput" placeholder="请输入你的名字">
        <br>
        <button class="btn" onclick="start()">进入邀请函</button>
    </div>
</div>

<!-- 封面 -->
<div class="page hidden bg cover" onclick="nextPage()">
    <img src="cover.jpg">
</div>

<!-- 信件 -->
<div class="page hidden bg" onclick="nextPage()">
    <div class="card">
        <div class="letter" id="letter"></div>
    </div>
</div>

<!-- 信息 -->
<div class="page hidden bg" onclick="nextPage()">
    <div class="card info">
        📍 益+coffee&tea<br><br>
        📅 2026.04.18<br><br>
        💜 Hyein Birthday Event<br><br>
        Dress Code：紫色 / 波点<br><br>

        <a href="https://surl.amap.com/cYD2lgm1A9q1" target="_blank">
            <button class="btn">📍 点击导航</button>
        </a>
    </div>
</div>

<!-- RSVP -->
<div class="page hidden bg">
    <div class="card">
        <h3>💌 要来吗？</h3>
        <button class="btn" onclick="showPopup()">我要来！</button>
    </div>
</div>

</div>

<!-- 弹窗 -->
<div class="popup" id="popup">
    <div class="popup-box">
        <p id="popupText"></p>
        <button class="btn" onclick="closePopup()">好呀💜</button>
    </div>
</div>

<script>
let pages=document.querySelectorAll('.page');
let current=0;
let userName="Bunnies";

/* 音乐淡入 */
function fadeIn(audio){
    audio.volume=0;
    audio.play();
    let v=0;
    let fade=setInterval(()=>{
        if(v<1){
            v+=0.05;
            audio.volume=v;
        }else{
            clearInterval(fade);
        }
    },200);
}

/* 开始 */
function start(){
    let input=document.getElementById("nameInput").value;
    if(input){userName=input;}

    let audio=document.getElementById("music");
    fadeIn(audio);

    nextPage();
}

/* 翻页 */
function nextPage(){
    if(current<pages.length-1){
        pages[current].classList.add('hidden');
        current++;
        pages[current].classList.remove('hidden');
        updateLetter();
    }
}

/* 信件 */
function updateLetter(){
document.getElementById("letter").innerHTML=`
<p>To 亲爱的 ${userName}：</p>

<p>안녕하세요~ 我是 Hyein！🐹<br>
好久不见，大家最近过得好吗？我最近过得超～级幸福，<br>
因为……我的生日快到啦！🎂✨</p>

<p>这一次，我想邀请我最爱的你们<br>
和我一起度过这个特别的日子！</p>

<p>你愿意来吗？<br>
我已经开始期待看到你们的笑容了！🥺💖</p>

<p>如果不能来也没关系，<br>
你的祝福我一定会收到的～</p>

<p>那我们那天见啦，不见不散！</p>

<p>사랑해요 🫶🏻<br>
Yours,<br>
Hyein</p>
`;
}

/* 弹窗 */
function showPopup(){
    document.getElementById("popup").style.display="flex";
    document.getElementById("popupText").innerHTML=
    "💜 "+userName+" 我们4.18见！";
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
