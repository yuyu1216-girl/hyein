<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Hyein Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Noto+Serif+SC&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    overflow:hidden;
    font-family:'Noto Serif SC',serif;
}

/* 💜 背景 */
.bg{
    position:fixed;
    width:100%;
    height:100vh;
    background:#eadcff;
    overflow:hidden;
    filter: blur(0.3px) saturate(1.05);
}

/* 🌫️ 光雾（保留） */
.bg::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.45), transparent 70%),
    radial-gradient(circle at 20% 80%, rgba(255,255,255,0.2), transparent 60%);
    animation:glow 5s ease-in-out infinite alternate;
}

@keyframes glow{
    from{opacity:0.3;}
    to{opacity:0.7;}
}

/* 🌌 随机波点 */
.dots{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
    pointer-events:none;
}

.dot{
    position:absolute;
    border-radius:50%;
    background:white;
    opacity:0.8;
    filter:blur(0.5px);
    animation:floatUp linear infinite;
}

@keyframes floatUp{
    from{transform:translateY(110vh);}
    to{transform:translateY(-10vh);}
}

/* 页面 */
.page{
    position:fixed;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    pointer-events:none;
    transition:0.7s;
    transform:scale(1.05);
}

.page.active{
    opacity:1;
    pointer-events:auto;
    transform:scale(1);
}

/* 封面 */
.cover{
    width:100%;
    max-width:600px;
    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

/* 输入 */
input{
    padding:18px;
    border-radius:16px;
    border:none;
    width:320px;
    max-width:80%;
    text-align:center;
    margin-top:24px;

    font-size:20px;
    letter-spacing:1px;

    box-shadow:0 8px 30px rgba(0,0,0,0.15);
    outline:none;
}

button{
    margin-top:20px;
    padding:14px 36px;
    border:none;
    background:#caa6ff;
    color:white;
    border-radius:30px;

    font-size:18px;
    letter-spacing:1px;

    box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

/* 信封 */
.envelope{
    width:95%;
    max-width:460px;
    height:260px;
    background:#fff;
    border-radius:12px;
    position:relative;
    cursor:pointer;
    perspective:1000px;
}

.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#e6ccff;
    clip-path:polygon(0 0,100% 0,50% 60%);
    transform-origin:top;
    transition:0.8s;
}

.envelope.open .flap{
    transform:rotateX(180deg);
}

/* 信件（优化版） */
.letter{
    width:95%;
    max-width:600px;
    height:85vh;
    background:white;
    border-radius:20px;
    padding:34px 26px;
    box-shadow:0 15px 60px rgba(0,0,0,0.25);

    font-size:20px;
    line-height:2.2;
    letter-spacing:0.6px;

    display:flex;
    flex-direction:column;

    animation:floatCard 5s ease-in-out infinite alternate;
}

@keyframes floatCard{
    from{transform:translateY(0);}
    to{transform:translateY(-10px);}
}

/* 信息页 */
.card{
    width:90%;
    max-width:520px;
    height:auto;              /* ✅ 不再撑满屏 */
    min-height:420px;         /* ✅ 保持卡片感 */

    background:white;
    border-radius:20px;
    padding:36px 28px;

    text-align:center;
    box-shadow:0 15px 50px rgba(0,0,0,0.2);

    font-size:20px;
    line-height:2.2;

    display:flex;
    flex-direction:column;
    justify-content:center;   /* ✅ 内容垂直居中 */
}

.map{
    color:#b07cff;
    text-decoration:underline;
    cursor:pointer;
}

.title{
    font-family:'Playfair Display',serif;
    font-size:56px;
    color:#caa6ff;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="dots"></div>

<audio id="music" src="music.mp3" loop></audio>

<!-- 封面 -->
<div class="page active" id="p1" onclick="nextPage()">
<img src="cover.jpg" class="cover">
</div>

<!-- 输入 -->
<div class="page" id="p2">
<div class="title">Hyein Invitation</div>
<input id="name" placeholder="Name">
<button onclick="go()">进入</button>
</div>

<!-- 信封 -->
<div class="page" id="p3">
<div class="envelope" onclick="openEnvelope(this)">
<div class="flap"></div>
</div>
<button onclick="nextPage()">打开信件</button>
</div>

<!-- 信件 -->
<div class="page" id="p4">
<div class="letter" id="letter"></div>
<button onclick="nextPage()">下一页</button>
</div>

<!-- 信息 -->
<div class="page" id="p5">
<div class="card">
💜 Happy Hyein's Day<br><br>

📅 2026.04.18<br><br>

📍 <span class="map" onclick="goMap()">广州 · 益+coffee&tea</span><br><br>

Dress Code：紫色 / 波点<br><br>

<button onclick="confirmAttend()">我要来！</button>
</div>
</div>

<script>
let page=1;
let userName="Bunnies";

/* 翻页 */
function nextPage(){
document.getElementById("p"+page).classList.remove("active");
page++;
document.getElementById("p"+page).classList.add("active");
updateLetter();
}

/* 进入 */
function go(){
let name=document.getElementById("name").value;
if(name!=="") userName=name;

let music=document.getElementById("music");
music.volume=0.3;
music.play();

let v=0.3;
let fade=setInterval(()=>{
if(v<1){v+=0.2;music.volume=v;}
else clearInterval(fade);
},100);

nextPage();
}

/* 信封 */
function openEnvelope(el){
el.classList.toggle("open");
}

/* 信件（内容完全保留，只优化排版） */
function updateLetter(){
document.getElementById("letter").innerHTML = `
<p style="margin-bottom:20px;">To 亲爱的 ${userName}：</p>
<p style="margin-bottom:16px;">안녕하세요~ 我是Hyein！🐹</p>
<p style="margin-bottom:16px;">
好久不见，大家最近过得好吗？我最近过得超～级幸福，因为……我的生日快到啦！🎂✨
</p>

<p style="margin-bottom:16px;">
这一次，我想邀请我最爱的你们和我一起度过这个特别的日子！你愿意来吗？我已经开始期待看到你们的笑容了！🥺💖
如果没有办法来也没关系，只要为我送上祝福，我都会超级感动的！因为只要有Bunnies在，每一天都像生日一样幸福～
</p>
<p style="margin-bottom:16px;">
别忘了：请穿上带有紫色或波点元素的衣服哦～我们一起拍超好看的照片！
</p>
<p style="margin-bottom:16px;">
那我们那天见啦！不见不散！
</p>
<p style="margin-bottom:20px;">
사랑해요, Bunnies! 🫶🏻
</p>
<p style="text-align:right;margin-top:auto;">
Yours,<br>Hyein
</p>
`;
}

/* 地图 */
function goMap(){
window.open("https://surl.amap.com/cYD2lgm1A9q1");
}

/* 弹窗 */
function confirmAttend(){
alert("💜 "+userName+" 我们4.18见！");
}

/* 🌌 生成随机波点 */
function createDots(){
const container=document.querySelector(".dots");

for(let i=0;i<70;i++){
let dot=document.createElement("div");
dot.className="dot";

let size=Math.random()*18+10;
dot.style.width=size+"px";
dot.style.height=size+"px";

dot.style.left=Math.random()*100+"%";
dot.style.top=Math.random()*100+"%";

dot.style.opacity=Math.random()*0.5+0.4;

let duration=Math.random()*8+8;
dot.style.animationDuration=duration+"s";

container.appendChild(dot);
}
}

createDots();
</script>

</body>
</html>
