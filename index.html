<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Noto+Serif+SC&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    overflow:hidden;
    font-family:'Noto Serif SC',serif;
}

/* 💜 背景 */
.bg{
    position:fixed;
    width:100%;
    height:100vh;
    background:#e9dcff;
    overflow:hidden;
}

/* ✨ 梦核波点（大+乱） */
.bg::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background-image:
    radial-gradient(circle, rgba(255,255,255,0.9) 20px, transparent 21px),
    radial-gradient(circle, rgba(255,255,255,0.7) 26px, transparent 27px),
    radial-gradient(circle, rgba(255,255,255,0.8) 14px, transparent 15px);
    background-size:280px 280px, 340px 340px, 220px 220px;
    transform:rotate(12deg);
}

/* 🌫️ 雾 */
.bg::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:radial-gradient(circle at 50% 40%, rgba(255,255,255,0.3), transparent 70%);
}

/* 页面 */
.page{
    position:fixed;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    top:0;
    left:0;
    opacity:0;
    pointer-events:none;
    transition:0.6s;
}

.page.active{
    opacity:1;
    pointer-events:auto;
}

/* 封面 */
.cover{
    width:70%;
    max-width:500px;
    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
    cursor:pointer;
}

/* 输入页 */
input{
    padding:12px;
    border-radius:10px;
    border:none;
    margin-top:20px;
    width:200px;
    text-align:center;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    background:#d6b3ff;
    border-radius:20px;
    cursor:pointer;
}

/* 信封 */
.envelope{
    width:320px;
    height:200px;
    background:#fff;
    border-radius:10px;
    position:relative;
    cursor:pointer;
}

.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#e4cfff;
    clip-path:polygon(0 0,100% 0,50% 60%);
    transition:0.6s;
}

.envelope.open .flap{
    transform:rotateX(180deg);
}

/* 信件 */
.letter{
    position:absolute;
    top:20px;
    left:10px;
    width:300px;
    height:420px;
    background:white;
    padding:20px;
    border-radius:10px;
    overflow:auto;
    opacity:0;
    transition:0.6s;
}

.envelope.open .letter{
    opacity:1;
    transform:translateY(-200px);
}

/* 字体 */
.title{
    font-family:'Playfair Display',serif;
    font-size:60px;
    color:#d29fff;
}

.text{
    font-size:18px;
    line-height:1.8;
    color:#333;
}

.signature{
    margin-top:20px;
    text-align:right;
}

/* 地址 */
.map{
    margin-top:20px;
    color:#b07cff;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- 🎵 音乐 -->
<audio id="music" src="music.mp3"></audio>

<!-- 🌸 封面 -->
<div class="page active" id="p1">
    <img src="cover.jpg" class="cover" onclick="nextPage()">
</div>

<!-- ✏️ 输入名字 -->
<div class="page" id="p2">
    <div class="title">Invitation</div>
    <input id="name" placeholder="输入你的名字">
    <button onclick="go()">进入</button>
</div>

<!-- 💌 信封 -->
<div class="page" id="p3">
    <div class="envelope" onclick="openLetter(this)">
        <div class="flap"></div>

        <div class="letter text">
            <p>To亲爱的Bunnies：</p>
            <p>안녕하세요~ 我是Hyein！🐹</p>
            <p>好久不见，大家最近过得好吗？我最近过得超～级幸福，因为……我的生日快到啦！🎂✨</p>
            <p>这一次，我想邀请我最爱的你们和我一起度过这个特别的日子！</p>
            <p>你愿意来吗？我已经开始期待看到你们的笑容了！🥺💖如果没有办法来也没关系，只要为我送上祝福，我都会超级感动的！因为只要有Bunnies在，每一天都像生日一样幸福～</p>
            <p>别忘了：请穿上带有紫色或波点元素的衣服哦～我们一起拍超好看的照片！</p>
            <p>那我们那天见啦！不见不散！</p>
            <p>사랑해요 🫶🏻</p>

            <div class="signature">
                Yours, Hyein
            </div>

            <div class="map" onclick="goMap()">
                📍 点击查看地点
            </div>

            <button onclick="confirmAttend()">我要来</button>
        </div>
    </div>
</div>

<script>
let page=1;

/* 切换页面 */
function nextPage(){
    document.getElementById("p"+page).classList.remove("active");
    page++;
    document.getElementById("p"+page).classList.add("active");
}

/* 输入名字 */
function go(){
    let name=document.getElementById("name").value;
    if(name===""){
        alert("请输入名字");
        return;
    }
    document.getElementById("music").volume=0;
    document.getElementById("music").play();

    let v=0;
    let fade=setInterval(()=>{
        if(v<1){
            v+=0.1;
            document.getElementById("music").volume=v;
        }else clearInterval(fade);
    },200);

    nextPage();
}

/* 打开信 */
function openLetter(el){
    el.classList.toggle("open");
}

/* 地图 */
function goMap(){
    window.open("https://maps.google.com");
}

/* 原始弹窗 */
function confirmAttend(){
    alert("太好啦！我等你来 💜");
}
</script>

</body>
</html>
