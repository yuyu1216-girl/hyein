<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hyein Invitation</title>

<!-- 分享卡片 -->
<meta property="og:title" content="🐹 Hyein Invitation 🐹">
<meta property="og:description" content="✨ Open it ✨ ">
<meta property="og:image" content="./cover.jpg">

<!-- 预加载 & 预连接优化 -->
<link rel="preload" as="image" href="./cover.jpg" fetchpriority="high">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* 彻底禁止微信字体放大 */
html {
    -webkit-text-size-adjust: 100% !important;
    text-size-adjust: 100% !important;
    font-size: 16px;
}
body {
    -webkit-text-size-adjust: 100% !important;
    text-size-adjust: 100% !important;
    font-size: 1rem;
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: 'Playfair Display', 'Noto Serif SC', serif;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* 背景层（雾效初始模糊+缩放） */
.bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background: #d9c6ea url('./cover.jpg') center/cover no-repeat;
    filter: blur(20px);
    transform: scale(1.1);
    transition: filter 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.9s ease-out;
    z-index: 0;
    /* 背景图片加载前显示底色，避免白屏 */
    background-color: #d9c6ea;
}
.bg::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(217, 198, 234, 0.65);
    transition: opacity 0.9s ease-out;
    opacity: 1;
}
/* 雾层散开后的清晰状态（由js动态添加类） */
.bg.clear {
    filter: blur(0px);
    transform: scale(1);
}
.bg.clear::after {
    opacity: 0;
}

/* 波点装饰 (氛围用) */
.dots {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
}
.dots::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.92) 10px, transparent 11px);
    background-size: 85px 85px;
    animation: breath1 5s ease-in-out infinite alternate;
}
.dots::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    transform: translate(42px, 42px);
    background: radial-gradient(circle, rgba(255,255,240,0.8) 9px, transparent 10px);
    background-size: 85px 85px;
    animation: breath2 6s ease-in-out infinite alternate;
}
@keyframes breath1 {
    from { opacity: 0.45; }
    to { opacity: 0.9; }
}
@keyframes breath2 {
    from { opacity: 0.3; }
    to { opacity: 0.8; }
}

/* 页面容器 */
.page {
    position: fixed;
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
    z-index: 10;
    padding: 20px;
    overflow-y: auto;
}
.page.active {
    opacity: 1;
    pointer-events: auto;
}

/* 封面图 - 优化渲染性能 */
.cover {
    width: 92%;
    max-width: 640px;
    border-radius: 32px;
    box-shadow: 0 25px 40px rgba(0,0,0,0.2);
    cursor: pointer;
    transition: transform 0.3s ease, opacity 0.6s ease;
    will-change: transform, opacity;
    opacity: 0;
    transform: scale(0.98);
    /* 初始透明，加载完成后由 JS 触发显示动画 */
}
.cover.loaded {
    opacity: 1;
    transform: scale(1);
    animation: coverGlow 0.7s ease-out;
}
@keyframes coverGlow {
    0% { opacity: 0; transform: scale(0.96); filter: blur(2px); }
    100% { opacity: 1; transform: scale(1); filter: blur(0); }
}
.cover:hover {
    transform: scale(1.01);
}

/* 标题 */
.title {
    font-size: 3rem;
    color: #a97cff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.1);
    letter-spacing: 2px;
    margin-bottom: 0.5rem;
    text-align: center;
}

/* 输入框 */
.input-name {
    padding: 1rem 1.2rem;
    border-radius: 48px;
    border: none;
    width: 80%;
    max-width: 340px;
    text-align: center;
    font-size: 1.2rem;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(4px);
    font-family: inherit;
    box-shadow: 0 5px 12px rgba(0,0,0,0.1);
}
.input-name:focus {
    outline: none;
    background: white;
    box-shadow: 0 0 0 3px rgba(169,124,255,0.4);
}

/* 按钮 */
.btn {
    margin-top: 1.5rem;
    padding: 0.8rem 2.2rem;
    border: none;
    background: rgba(169, 124, 255, 0.85);
    color: white;
    border-radius: 60px;
    font-size: 1.2rem;
    font-weight: 500;
    cursor: pointer;
    transition: 0.25s;
    backdrop-filter: blur(4px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.btn:hover {
    transform: scale(1.03);
    background: #b77eff;
    box-shadow: 0 8px 20px rgba(140, 92, 255, 0.4);
}

/* 信封容器 */
.envelope {
    width: 90%;
    max-width: 360px;
    aspect-ratio: 360 / 220;
    position: relative;
    cursor: pointer;
    border-radius: 14px;
    background: #fff2e0;
    box-shadow: 0 20px 30px rgba(0,0,0,0.2);
    transition: transform 0.2s;
    animation: gentleFloat 3s ease-in-out infinite;
}
@keyframes gentleFloat {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
}
.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #caa6ff;
    clip-path: polygon(0 0, 100% 0, 50% 92%);
    transform-origin: top;
    transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    border-radius: 14px 14px 0 0;
    z-index: 3;
}
.body {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #fffaf2;
    border-radius: 14px;
    box-shadow: inset 0 1px 4px rgba(0,0,0,0.05);
}
.body::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, transparent 49%, rgba(0,0,0,0.03) 50%, transparent 51%),
                linear-gradient(225deg, transparent 49%, rgba(0,0,0,0.03) 50%, transparent 51%);
    pointer-events: none;
}
.envelope.open .flap {
    transform: rotateX(180deg);
}
.hint {
    margin-top: 1.5rem;
    font-size: 1rem;
    color: #a16eff;
    font-weight: 500;
    background: rgba(255,255,240,0.6);
    padding: 0.3rem 1rem;
    border-radius: 60px;
    backdrop-filter: blur(4px);
}

/* 信纸 */
.letter {
    width: 92%;
    max-width: 620px;
    background: rgba(255, 250, 245, 0.92);
    backdrop-filter: blur(6px);
    border-radius: 36px;
    padding: 2rem 2rem;
    font-size: 1.05rem;
    line-height: 1.9;
    overflow-wrap: break-word;
    word-break: break-word;
    box-shadow: 0 20px 35px rgba(0,0,0,0.15);
    border: 1px solid rgba(255,255,200,0.6);
}
.letter p {
    text-indent: 2em;
    margin-bottom: 0.8rem;
}
.letter p:first-child {
    text-indent: 0;
}
.letter p:last-child {
    margin-bottom: 0;
}

/* 卡片页 (party info) */
.card {
    width: 92%;
    max-width: 520px;
    padding: 2rem 1.8rem;
    background: rgba(255, 245, 255, 0.88);
    backdrop-filter: blur(12px);
    border-radius: 48px;
    text-align: center;
    font-size: 1.2rem;
    line-height: 2.4;
    box-shadow: 0 20px 30px rgba(0,0,0,0.2);
    border: 1px solid rgba(255,215,255,0.6);
}
.countdown-box {
    background: rgba(169, 124, 255, 0.2);
    border-radius: 60px;
    padding: 0.3rem 1rem;
    display: inline-block;
    margin: 0.6rem 0;
    font-weight: 500;
    font-size: 1rem;
}
.map-link {
    display: inline-block;
    padding: 0.4rem 1.2rem;
    border-radius: 40px;
    background: rgba(140, 92, 255, 0.2);
    color: #7b4cff;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}
.map-link:hover {
    background: rgba(140, 92, 255, 0.4);
    transform: scale(1.02);
}
.heart-fly {
    position: fixed;
    font-size: 1.8rem;
    pointer-events: none;
    z-index: 200;
    animation: flyHeart 1.4s forwards;
}
@keyframes flyHeart {
    0% {
        transform: translateY(0) scale(0.6);
        opacity: 1;
    }
    100% {
        transform: translateY(-180px) scale(1.2);
        opacity: 0;
    }
}

/* 响应式 */
@media (max-width: 550px) {
    html {
        font-size: 14px;
    }
    .title {
        font-size: 2.4rem;
    }
    .letter {
        font-size: 0.95rem;
        padding: 1.4rem;
    }
    .card {
        font-size: 1rem;
        padding: 1.4rem;
    }
    .btn {
        font-size: 1rem;
        padding: 0.6rem 1.8rem;
    }
}
</style>
</head>
<body>

<div class="bg" id="bgLayer"></div>
<div class="dots"></div>

<audio id="bgMusic" src="music.mp3" loop preload="auto"></audio>

<!-- 封面页 P1 -->
<div class="page active" id="page1">
    <img src="./cover.jpg" class="cover" alt="Hyein Invitation" 
         fetchpriority="high" 
         loading="eager"
         id="coverImg">
</div>

<!-- 输入昵称 P2 -->
<div class="page" id="page2">
    <div class="title">Hyein Invitation</div>
    <input type="text" id="guestName" class="input-name" placeholder="Nickname" autocomplete="off">
    <button class="btn" id="okNameBtn">OK</button>
</div>

<!-- 信封页 P3 -->
<div class="page" id="page3">
    <div class="envelope" id="envelopeBox">
        <div class="flap"></div>
        <div class="body"></div>
    </div>
    <div class="hint">💌 Open it 💌</div>
</div>

<!-- 信件内容 P4 -->
<div class="page" id="page4">
    <div class="letter" id="letterContent"></div>
    <div style="margin-top: 20px; font-size: 0.85rem; color: #b27eff;">✨ 轻点任意处 继续 ✨</div>
</div>

<!-- 派对详情 P5 -->
<div class="page" id="page5">
    <div class="card">
        💜 Happy Hyein's Day 💜<br>
         2026.04.18<br>
         <span class="map-link" id="mapTrigger">益+ coffee & tea</span><br>
        🎀 Dress Code：紫色 / 波点元素🎀<br>
        <div class="countdown-box" id="countdownDisplay">⏳ 计算中...</div>
        <button class="btn" id="confirmBtn" style="margin-top: 1rem;">我要来</button>
    </div>
</div>

<script>
// ---------- DOM 元素 ----------
const bgLayer = document.getElementById('bgLayer');
const pages = [document.getElementById('page1'), document.getElementById('page2'), document.getElementById('page3'), document.getElementById('page4'), document.getElementById('page5')];
let currentPageIdx = 0;
let userName = "Bunnies";
let envelopeOpened = false;
let musicPlaying = false;
let fogDissolved = false;      // 确保雾层只散开一次
let coverLoaded = false;

// ---------- 封面图加载处理（稳健降级）----------
const coverImg = document.getElementById('coverImg');
function handleCoverLoaded() {
    if (coverLoaded) return;
    coverLoaded = true;
    // 添加loaded类触发渐显动画
    coverImg.classList.add('loaded');
    // 封面图加载完成后，再启动雾层散开（一秒散开效果）
    if (!fogDissolved) {
        setTimeout(() => {
            startFogDissolve();
        }, 80); // 稍微延迟让封面动画更平滑
        fogDissolved = true;
    }
}
function handleCoverError() {
    // 优雅降级：使用内嵌 SVG 渐变 + 文字占位，完全本地，无需网络请求，杜绝 missing
    const svgData = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 1000'%3E%3Crect width='100%25' height='100%25' fill='%23d9c6ea'/%3E%3Ctext x='50%25' y='45%25' font-size='32' font-family='monospace' fill='%238c5cff' text-anchor='middle'%3E🐹 Hyein's Party 🐹%3C/text%3E%3Ctext x='50%25' y='55%25' font-size='24' fill='%23a97cff' text-anchor='middle'%3E💜 紫色波点之约 💜%3C/text%3E%3C/svg%3E`;
    coverImg.src = svgData;
    // 即使降级，依然触发加载完成效果
    handleCoverLoaded();
}
if (coverImg) {
    if (coverImg.complete && coverImg.naturalWidth !== 0) {
        // 图片已缓存，直接触发
        handleCoverLoaded();
    } else {
        coverImg.addEventListener('load', handleCoverLoaded);
        coverImg.addEventListener('error', handleCoverError);
    }
} else {
    // 极端情况无img元素，直接散开雾层
    startFogDissolve();
}

// ---------- 雾层一秒散开 (背景清晰露出) ----------
function startFogDissolve() {
    if (bgLayer && !bgLayer.classList.contains('clear')) {
        bgLayer.classList.add('clear');
    }
}

// ---------- 音乐自动播放 (兼容微信/浏览器) ----------
function initAutoPlayMusic() {
    const music = document.getElementById('bgMusic');
    if (!music) return;
    music.volume = 0.35;
    const tryPlay = () => {
        music.play().then(() => {
            musicPlaying = true;
        }).catch(() => {});
    };
    document.addEventListener('click', tryPlay, { once: true });
    document.addEventListener('touchstart', tryPlay, { once: true });
    document.addEventListener('WeixinJSBridgeReady', () => {
        music.play().catch(()=>{});
    });
    setTimeout(() => {
        if (!musicPlaying) tryPlay();
    }, 800);
}

// ---------- 页面切换 ----------
function goToPage(index) {
    if (index < 0 || index >= pages.length) return;
    pages.forEach(page => page.classList.remove('active'));
    pages[index].classList.add('active');
    currentPageIdx = index;
    if (index === 3) renderLetter();
    if (index === 4) updateCountdownDisplay();
}

function nextPage() {
    if (currentPageIdx === 0) {
        goToPage(1);
    } 
    else if (currentPageIdx === 1) {
        const nameInput = document.getElementById('guestName');
        let inputName = nameInput.value.trim();
        userName = inputName !== "" ? inputName : "Bunnies";
        goToPage(2);
    }
    else if (currentPageIdx === 2) {
        if (!envelopeOpened) {
            const hintDiv = document.querySelector('#page3 .hint');
            hintDiv.style.transform = "scale(1.05)";
            setTimeout(() => { hintDiv.style.transform = ""; }, 300);
            return;
        }
        goToPage(3);
    }
    else if (currentPageIdx === 3) {
        goToPage(4);
    }
}

function renderLetter() {
    const letterDiv = document.getElementById('letterContent');
    if (!letterDiv) return;
    letterDiv.innerHTML = `
        <p>To 亲爱的 ${userName}：</p>
        <p>안녕하세요~ 我是Hyein！🐹</p>
        <p>好久不见，大家最近过得好吗？我最近过得超～级幸福，因为……我的生日快到啦！🎂✨</p>
        <p>这一次，我想邀请我最爱的你们和我一起度过这个特别的日子！你愿意来吗？我已经开始期待看到你们的笑容了！🥺💖</p>
        <p>如果没有办法来也没关系，只要为我送上祝福，我都会超级感动的！因为只要有Bunnies在，每一天都像生日一样幸福～</p>
        <p>别忘了：请穿上带有紫色或波点元素的衣服哦～我们一起拍超好看的照片！</p>
        <p>那我们那天见啦！不见不散！</p>
        <p>사랑해요, Bunnies! 🫶🏻</p>
        <p style="text-align:right; margin-top:22px;">Yours,<br>Hyein 💜</p>
    `;
}

function updateCountdownDisplay() {
    const targetDate = new Date(2026, 3, 18, 0, 0, 0);
    const now = new Date();
    const diff = targetDate - now;
    const countdownEl = document.getElementById('countdownDisplay');
    if (!countdownEl) return;
    if (diff <= 0) {
        countdownEl.innerHTML = "🎉 就是今天！Hyein's Day 🎉";
        return;
    }
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (86400000)) / (3600000));
    const mins = Math.floor((diff % 3600000) / 60000);
    countdownEl.innerHTML = `⏳ 倒计时：${days}天 ${hours}小时 ${mins}分`;
}

let countdownInterval = null;
function startCountdownTimer() {
    if (countdownInterval) clearInterval(countdownInterval);
    updateCountdownDisplay();
    countdownInterval = setInterval(updateCountdownDisplay, 1000);
}

function openMap() {
    window.open("https://surl.amap.com/cYD2lgm1A9q1", "_blank");
}

function confirmAttendance() {
    for (let i = 0; i < 20; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart-fly';
        heart.innerHTML = ['💜', '💖', '🐹', '✨', '🐳', '🎀'][Math.floor(Math.random() * 6)];
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.bottom = '10vh';
        heart.style.fontSize = 1.5 + Math.random() * 1.2 + 'rem';
        heart.style.position = 'fixed';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1400);
    }
    alert(`🍓 ${userName}，我们4.18见！💜`);
}

function setupEnvelope() {
    const envelope = document.getElementById('envelopeBox');
    if (!envelope) return;
    envelope.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!envelopeOpened) {
            envelope.classList.add('open');
            envelopeOpened = true;
            const hintMsg = document.querySelector('#page3 .hint');
            if (hintMsg) hintMsg.innerHTML = "Click it";
        } else {
            nextPage();
        }
    });
}

function bindEvents() {
    const coverImgClick = document.querySelector('#page1 .cover');
    if (coverImgClick) coverImgClick.addEventListener('click', () => nextPage());
    const okBtn = document.getElementById('okNameBtn');
    if (okBtn) okBtn.addEventListener('click', () => nextPage());
    const nameInput = document.getElementById('guestName');
    if (nameInput) nameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') nextPage(); });
    const pageLetter = document.getElementById('page4');
    if (pageLetter) pageLetter.addEventListener('click', () => nextPage());
    const mapSpan = document.getElementById('mapTrigger');
    if (mapSpan) mapSpan.addEventListener('click', openMap);
    const confirmBtn = document.getElementById('confirmBtn');
    if (confirmBtn) confirmBtn.addEventListener('click', confirmAttendance);
}

// 初始化
window.addEventListener('load', () => {
    setupEnvelope();
    bindEvents();
    startCountdownTimer();
    initAutoPlayMusic();
    renderLetter();          // 预渲染信件内容
    // 如果封面图在load之前已经加载完成，handleCoverLoaded已调用；如果未完成则等待事件。
    // 额外兜底：若3秒后封面仍未触发loaded（罕见情况），手动强制散开雾层
    setTimeout(() => {
        if (!coverLoaded) {
            coverImg.classList.add('loaded');
            if (!fogDissolved) {
                startFogDissolve();
                fogDissolved = true;
            }
        }
    }, 2500);
});
</script>
</body>
</html>
