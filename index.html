<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Hyein Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Noto+Serif+SC&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    overflow:hidden;
    font-family:'Noto Serif SC',serif;
}

/* 💜 背景 */
.bg{
    position:fixed;
    width:100%;
    height:100vh;
    background:#eadcff;
    overflow:hidden;
}

/* 🫧 梦核波点（已修：不挤 + 更随机） */
.bg::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background-image:
    radial-gradient(circle, rgba(255,255,255,0.9) 35px, transparent 37px),
    radial-gradient(circle, rgba(255,255,255,0.8) 28px, transparent 30px),
    radial-gradient(circle, rgba(255,255,255,0.7) 45px, transparent 47px);

    background-size:600px 600px, 850px 850px, 500px 500px;

    background-position:
    0 0,
    200px 300px,
    350px 150px;

    animation:floatDots 30s linear infinite, dotGlow 6s ease-in-out infinite alternate;
}

/* 🌫️ 多层光雾 */
.bg::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.45), transparent 70%),
    radial-gradient(circle at 20% 80%, rgba(255,255,255,0.2), transparent 60%);
    animation:glow 5s ease-in-out infinite alternate;
}

@keyframes floatDots{
    from{transform:translateY(0) rotate(0deg);}
    to{transform:translateY(-300px) rotate(12deg);}
}

@keyframes glow{
    from{opacity:0.3;}
    to{opacity:0.7;}
}

@keyframes dotGlow{
    from{opacity:0.85;}
    to{opacity:1;}
}

/* 页面切换（梦境感） */
.page{
    position:fixed;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    pointer-events:none;
    transition:0.7s;
    transform:scale(1.05);
}

.page.active{
    opacity:1;
    pointer-events:auto;
    transform:scale(1);
}

/* 封面 */
.cover{
    width:90%;
    max-width:600px;
    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

/* 输入 */
input{
    padding:14px;
    border-radius:10px;
    border:none;
    width:260px;
    text-align:center;
    margin-top:20px;
}

button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    background:#caa6ff;
    color:white;
    border-radius:25px;
}

/* 💌 信封 */
.envelope{
    width:95%;
    max-width:460px;
    height:260px;
    background:#fff;
    border-radius:12px;
    position:relative;
    cursor:pointer;
    perspective:1000px;
}

.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#e6ccff;
    clip-path:polygon(0 0,100% 0,50% 60%);
    transform-origin:top;
    transition:0.8s;
}

.envelope.open .flap{
    transform:rotateX(180deg);
}

/* 📄 信件（已放大 + 漂浮） */
.letter{
    width:95%;
    max-width:600px;
    height:85vh;
    background:white;
    border-radius:18px;
    padding:28px;
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
    font-size:20px;
    line-height:2;
    animation:floatCard 5s ease-in-out infinite alternate;
}

@keyframes floatCard{
    from{transform:translateY(0);}
    to{transform:translateY(-10px);}
}

/* 信息页 */
.card{
    width:95%;
    max-width:600px;
    height:85vh;
    background:white;
    border-radius:18px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
    font-size:22px;
    line-height:2;
}

/* 点击地址 */
.map{
    color:#b07cff;
    text-decoration:underline;
    cursor:pointer;
}

.title{
    font-family:'Playfair Display',serif;
    font-size:48px;
    color:#caa6ff;
}
</style>
</head>

<body>

<div class="bg"></div>

<audio id="music" src="music.mp3" loop></audio>

<!-- 封面 -->
<div class="page active" id="p1" onclick="nextPage()">
<img src="cover.jpg" class="cover">
</div>

<!-- 输入 -->
<div class="page" id="p2">
<div class="title">Hyein Invitation</div>
<input id="name" placeholder="Name">
<button onclick="go()">进入</button>
</div>

<!-- 信封 -->
<div class="page" id="p3">
<div class="envelope" onclick="openEnvelope(this)">
<div class="flap"></div>
</div>
<button onclick="nextPage()">打开信件</button>
</div>

<!-- 信件 -->
<div class="page" id="p4">
<div class="letter" id="letter"></div>
<button onclick="nextPage()">下一页</button>
</div>

<!-- 信息 -->
<div class="page" id="p5">
<div class="card">
💜 Happy Hyein's Day<br><br>

📅 2026.04.18<br><br>

📍 <span class="map" onclick="goMap()">广州 · 益+coffee&tea</span><br><br>

Dress Code：紫色 / 波点<br><br>

<button onclick="confirmAttend()">我要来！</button>
</div>
</div>

<script>
let page=1;
let userName="Bunnies";

function nextPage(){
document.getElementById("p"+page).classList.remove("active");
page++;
document.getElementById("p"+page).classList.add("active");
updateLetter();
}

function go(){
let name=document.getElementById("name").value;
if(name!=="") userName=name;

let music=document.getElementById("music");
music.volume=0.3; // ✔ 已加快进入
music.play();

let v=0.3;
let fade=setInterval(()=>{
if(v<1){v+=0.2;music.volume=v;}
else clearInterval(fade);
},100);

nextPage();
}

function openEnvelope(el){
el.classList.toggle("open");
}

function updateLetter(){
document.getElementById("letter").innerHTML = `
<p>To 亲爱的 ${userName}：</p>

<p>안녕하세요~ 我是Hyein！🐹</p>

<p>好久不见，大家最近过得好吗？我最近过得超～级幸福，因为……我的生日快到啦！🎂✨</p>

<p>这一次，我想邀请我最爱的你们和我一起度过这个特别的日子！</p>

<p>你愿意来吗？我已经开始期待看到你们的笑容了！🥺💖</p>

<p>如果没有办法来也没关系，只要为我送上祝福，我都会超级感动的！因为只要有Bunnies在，每一天都像生日一样幸福～</p>

<p>别忘了：请穿上带有紫色或波点元素的衣服哦～我们一起拍超好看的照片！</p>

<p>那我们那天见啦！不见不散！</p>

<p>사랑해요, Bunnies! 🫶🏻</p>

<p style="text-align:right;">Yours,<br>Hyein</p>
`;
}

function goMap(){
window.open("https://surl.amap.com/cYD2lgm1A9q1");
}

function confirmAttend(){
alert("💜 "+userName+" 我们4.18见！");
}
</script>

</body>
</html>
