<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC&display=swap" rel="stylesheet">

<title>Hyein Invitation</title>

<style>
body{
    margin:0;
    font-family:'Noto Serif SC',serif;
    background:#d9c6ec;
}

/* 页面 */
.page{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.hidden{display:none;}

/* 梦核背景 */
.bg{
    background:#d9c6ec;
    position:relative;
    overflow:hidden;
}

.bg::after{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;

    background:
    radial-gradient(circle at 15% 20%, #fff7 10px, transparent 11px),
    radial-gradient(circle at 70% 30%, #fff6 12px, transparent 13px),
    radial-gradient(circle at 40% 80%, #fff5 9px, transparent 10px),
    radial-gradient(circle at 80% 70%, #fff7 11px, transparent 12px);
}

/* 卡片 */
.card{
    width:90%;
    max-width:520px;
    background:rgba(255,255,255,0.9);
    border-radius:24px;
    padding:30px;
    text-align:center;
}

/* 输入 */
.input{
    width:80%;
    padding:12px;
    border-radius:20px;
    border:1px solid #ccc;
}

/* 按钮 */
.btn{
    margin-top:15px;
    padding:12px;
    width:70%;
    border:none;
    border-radius:25px;
    background:#9b7bff;
    color:white;
}

/* 封面 */
.cover img{
    width:90%;
}

/* 信封 */
.envelope{
    width:300px;
    height:200px;
    background:white;
    border-radius:12px;
    position:relative;
    cursor:pointer;
}

.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#cbb5ff;
    clip-path:polygon(0 0,100% 0,50% 60%);
    transition:0.6s;
}

.open .flap{
    transform:rotateX(180deg);
}

/* 信件展开 */
.letterBox{
    width:90%;
    max-width:520px;
    background:white;
    border-radius:20px;
    padding:20px;
    max-height:0;
    overflow:hidden;
    transition:0.6s;
}

.letterBox.open{
    max-height:80vh;
}

/* 信件 */
.letter{
    text-align:left;
    line-height:1.9;
}

.letter p{
    text-indent:2em;
}

.letter p:first-child{
    text-indent:0;
}

/* 弹窗 */
.popup{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    justify-content:center;
    align-items:center;
}
.popup-box{
    background:white;
    padding:30px;
    border-radius:20px;
}
</style>
</head>

<body>

<audio id="music" src="music.mp3" loop></audio>

<!-- 输入 -->
<div class="page bg" id="p0">
    <div class="card">
        <h3>💜 Bunnies Invitation 💜</h3>
        <input class="input" id="nameInput" placeholder="请输入你的名字">
        <br>
        <button class="btn" onclick="start()">进入</button>
    </div>
</div>

<!-- 封面 -->
<div class="page bg hidden cover" id="p1" onclick="nextPage()">
    <img src="cover.jpg">
</div>

<!-- 信封 -->
<div class="page bg hidden" id="p2">
    <div class="envelope" id="env" onclick="openEnvelope()">
        <div class="flap"></div>
    </div>
</div>

<!-- 信件（点击展开） -->
<div class="page bg hidden" id="p3">
    <div class="card" onclick="openLetter()">
        💌 点击展开信件
    </div>

    <div class="letterBox" id="letterBox">
        <div class="letter" id="letter"></div>
    </div>
</div>

<!-- 信息 -->
<div class="page bg hidden" id="p4" onclick="nextPage()">
    <div class="card">
        📍 广州 · 益+coffee&tea<br><br>
        📅 2026.04.18<br><br>
        💜 Hyein Birthday Event
    </div>
</div>

<!-- RSVP -->
<div class="page bg hidden" id="p5">
    <div class="card">
        <button class="btn" onclick="showPopup()">我要来！</button>
    </div>
</div>

<!-- 弹窗 -->
<div class="popup" id="popup">
    <div class="popup-box">
        <p id="popupText"></p>
        <button class="btn" onclick="closePopup()">好呀💜</button>
    </div>
</div>

<script>
let current=0;
let userName="Bunnies";

function showPage(n){
    document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));
    document.getElementById("p"+n).classList.remove('hidden');
}

function nextPage(){
    current++;
    showPage(current);
}

function start(){
    let val=document.getElementById("nameInput").value;
    if(val){userName=val;}

    let a=document.getElementById("music");
    a.play();

    nextPage();
}

function openEnvelope(){
    document.getElementById("env").classList.add("open");
    setTimeout(()=>nextPage(),500);
}

function openLetter(){
    let box=document.getElementById("letterBox");
    box.classList.toggle("open");

    document.getElementById("letter").innerHTML=`
<p>To 亲爱的 ${userName}：</p>
<p>안녕하세요~ 我是Hyein！🐹
好久不见，大家最近过得好吗？我最近过得超～级幸福，因为……我的生日快到啦！</p>

<p>这一次，我想邀请我最爱的你们和我一起度过这个特别的日子！</p>

<p>你愿意来吗？我已经开始期待看到你们的笑容了！如果没有办法来也没关系，在远方为我送上祝福，我也会超级感动的！因为只要有Bunnies在，每一天都像生日一样幸福～</p>

<p>别忘了：请穿上带有紫色或波点元素的衣服哦～我们一起搭配，拍超好看的照片！</p>

<p>那我们那天见啦！不见不散！</p>

<p>사랑해요, Bunnies! 🫶🏻</p>

<p style="text-align:right;">Yours,<br>Hyein</p>
`;
}

function showPopup(){
    document.getElementById("popup").style.display="flex";
    document.getElementById("popupText").innerHTML=
    "💜 "+userName+" 我们4.18见！";
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
