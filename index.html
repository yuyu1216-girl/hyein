<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC&display=swap" rel="stylesheet">

<title>Hyein Invitation</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:'Noto Serif SC',serif;
    background:#e6dbff;
}

/* 🌫️ 雾 */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle at 60% 30%, #ffffff88, transparent 60%);
    filter:blur(80px);
    animation:fog 10s ease-in-out infinite alternate;
}
@keyframes fog{
    from{transform:translateY(-20px);}
    to{transform:translateY(20px);}
}

/* ✨ 光 */
body::after{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(180deg,#ffffff30,#ffffff05);
    animation:light 6s infinite alternate;
}
@keyframes light{
    from{opacity:0.6;}
    to{opacity:1;}
}

/* 💜 波点（大颗梦核） */
.bg{
    background:#e6dbff;
    position:relative;
}
.bg::after{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:radial-gradient(circle,#ffffff55 18px,transparent 18px);
    background-size:160px 160px;
    animation:floatDots 40s linear infinite;
}
@keyframes floatDots{
    from{transform:translateY(0);}
    to{transform:translateY(-300px);}
}

/* 页面 */
.page{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    transition:0.8s;
}
.hidden{
    transform:translateY(100%);
}

/* 卡片（信纸感） */
.card{
    width:94%;
    max-width:700px;
    min-height:60vh;
    background:rgba(255,255,255,0.55);
    backdrop-filter:blur(25px);
    border-radius:30px;
    padding:40px 36px;
    box-shadow:0 0 120px rgba(180,150,255,0.25);
}

/* 输入 */
.input{
    padding:12px;
    border-radius:20px;
    border:1px solid #ddd;
    width:70%;
    text-align:center;
}

/* 按钮 */
.btn{
    margin-top:20px;
    padding:12px;
    width:70%;
    border:none;
    border-radius:25px;
    background:#9b7bff;
    color:white;
}

/* 封面 */
.cover img{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* 信封 */
.envelope{
    width:420px;
    height:260px;
    background:white;
    border-radius:20px;
    position:relative;
    cursor:pointer;
    animation:glow 3s infinite alternate;
}
@keyframes glow{
    from{box-shadow:0 0 40px rgba(160,120,255,0.2);}
    to{box-shadow:0 0 120px rgba(200,160,255,0.6);}
}

.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#d8c5ff;
    clip-path:polygon(0 0,100% 0,50% 65%);
    transform-origin:top;
    transition:1s;
}
.open .flap{
    transform:rotateX(180deg);
}

/* 信件 */
.letter{
    font-size:18px;
    line-height:2.2;
    color:#3f2b7a;
}
.letter p{
    text-indent:2em;
    margin:12px 0;
}
.letter p:first-child{
    text-indent:0;
    font-weight:600;
}
.signature{
    text-align:right;
}

/* 💜 弹窗 */
#popup{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    justify-content:center;
    align-items:center;
}
.popupBox{
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(25px);
    padding:30px;
    border-radius:20px;
    text-align:center;
    color:#5a3fd1;
}
</style>
</head>

<body>

<audio id="music" src="music.mp3" loop></audio>

<!-- 输入 -->
<div class="page bg" id="page0">
    <div class="card" style="text-align:center;">
        <h3>💜 Bunnies Invitation 💜</h3>
        <input class="input" id="nameInput" placeholder="请输入你的名字">
        <button class="btn" onclick="start()">进入</button>
    </div>
</div>

<!-- 封面 -->
<div class="page cover hidden" id="page1" onclick="nextPage()">
    <img src="cover.jpg">
</div>

<!-- 信封 -->
<div class="page bg hidden" id="page2">
    <div class="envelope" id="env" onclick="openEnvelope()">
        <div class="flap"></div>
    </div>
</div>

<!-- 信件 -->
<div class="page bg hidden" id="page3" onclick="nextPage()">
    <div class="card letter" id="letter"></div>
</div>

<!-- 信息 -->
<div class="page bg hidden" id="page4" onclick="nextPage()">
    <div class="card">
        📍 广州 · 益+coffee&tea<br><br>
        📅 2026.04.18<br><br>
        💜 Hyein Birthday Event<br><br>
        Dress Code：紫色 / 波点
    </div>
</div>

<!-- RSVP -->
<div class="page bg hidden" id="page5">
    <div class="card">
        💌 要来吗？<br><br>
        <button class="btn" onclick="showPopup()">我要来！</button>
    </div>
</div>

<!-- 弹窗 -->
<div id="popup">
    <div class="popupBox">
        💜 <span id="popupText"></span><br><br>
        <button class="btn" onclick="closePopup()">好的</button>
    </div>
</div>

<script>
let current=0;
let userName="Bunnies";

/* 音乐淡入 */
function playMusic(){
    let a=document.getElementById("music");
    a.volume=0;
    a.play().catch(()=>{});
    let v=0;
    let fade=setInterval(()=>{
        if(v<1){v+=0.05;a.volume=v;}else clearInterval(fade);
    },200);
}

/* 开始 */
function start(){
    let input=document.getElementById("nameInput").value;
    if(input){userName=input;}
    playMusic();
    nextPage();
}

/* 翻页 */
function nextPage(){
    document.getElementById("page"+current).classList.add("hidden");
    current++;
    document.getElementById("page"+current).classList.remove("hidden");
    if(current===3){typeLetter();}
}

/* 信封 */
function openEnvelope(){
    document.getElementById("env").classList.add("open");
    document.body.style.background="#fff";
    setTimeout(()=>{
        document.body.style.background="#e6dbff";
        nextPage();
    },400);
}

/* 打字效果 */
function typeLetter(){
let text=`To 亲爱的 ${userName}：

안녕하세요~ 我是Hyein！🐹

好久不见，大家最近过得好吗？我最近过得超～级幸福，因为……我的生日快到啦！

这一次，我想邀请我最爱的你们和我一起度过这个特别的日子！

你愿意来吗？我已经开始期待看到你们的笑容了！如果没有办法来也没关系，在远方为我送上祝福，我也会超级感动的！因为只要有Bunnies在，每一天都像生日一样幸福～

别忘了：请穿上带有紫色或波点元素的衣服哦～我们一起搭配，拍超好看的照片！

那我们那天见啦！不见不散！

사랑해요, Bunnies! 🫶🏻

Yours,
Hyein`;

let i=0;
let speed=30;
let box=document.getElementById("letter");
box.innerHTML="";

function typing(){
    if(i<text.length){
        box.innerHTML+=text.charAt(i);
        i++;
        setTimeout(typing,speed);
    }
}
typing();
}

/* 弹窗 */
function showPopup(){
    document.getElementById("popupText").innerText=userName+"，我们4.18广州见 💜";
    document.getElementById("popup").style.display="flex";
}
function closePopup(){
    document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
