<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hyein Invitation</title>

<link rel="preload" as="image" href="./cover.jpg">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body,input,button{
    font-family:'Playfair Display','Noto Serif SC',serif;
    overflow:hidden;
}

/* 背景 */
.bg{
    position:fixed;
    width:100%;
    height:100vh;
    background:#d9c6ea url('./cover.jpg') center/cover no-repeat;
    filter:blur(20px);
    transform:scale(1.1);
}
.bg::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(217,198,234,0.6);
}

/* ✨ 不规则波点（封神版） */
.dots{
    position:fixed;
    width:100%;
    height:100%;
    pointer-events:none;
}
.dot{
    position:absolute;
    border-radius:50%;
    background:white;
    opacity:0.8;
    animation:breath 3s infinite ease-in-out;
}
@keyframes breath{
    0%,100%{opacity:0.3;transform:scale(0.8);}
    50%{opacity:1;transform:scale(1.2);}
}

/* 页面 */
.page{
    position:fixed;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    pointer-events:none;
    transition:0.6s;
    padding:20px;
}
.page.active{opacity:1;pointer-events:auto;}

/* 封面 */
.cover{
    width:92%;
    max-width:620px;
    border-radius:22px;
    opacity:0;
    transition:opacity 1s;
}
.cover.loaded{opacity:1;}

/* 标题 */
.title{
    font-size:64px;
    color:#caa6ff;
}

/* 输入 */
input{
    padding:20px;
    border-radius:22px;
    border:none;
    width:80%;
    max-width:360px;
    text-align:center;
    font-size:22px;
    margin-top:24px;
    background:rgba(255,255,255,0.7);
}

/* 按钮 */
button{
    margin-top:22px;
    padding:16px 40px;
    border:none;
    background:rgba(200,160,255,0.7);
    color:#fff;
    border-radius:30px;
    font-size:20px;
    cursor:pointer;
    transition:0.3s;
}
button:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px rgba(180,120,255,0.6);
}

/* 信封 */
.envelope{
    width:360px;
    height:220px;
    position:relative;
    cursor:pointer;
    border-radius:12px;
    background:#fff;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    animation:float 3s ease-in-out infinite;
}
@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* 三角盖（更明显） */
.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#caa6ff;
    clip-path:polygon(0 0,100% 0,50% 90%);
    transform-origin:top;
    transition:0.5s;
}
.envelope.open .flap{
    transform:rotateX(180deg);
}

/* 主体 */
.body{
    position:absolute;
    width:100%;
    height:100%;
    background:#fff;
    border-radius:12px;
}

/* 折痕 */
.body::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
    linear-gradient(135deg, transparent 49%, rgba(0,0,0,0.1) 50%, transparent 51%),
    linear-gradient(225deg, transparent 49%, rgba(0,0,0,0.1) 50%, transparent 51%);
}

/* 提示 */
.hint{
    margin-top:18px;
    font-size:18px;
    color:#8c5cff;
}

/* 信纸 */
.letter{
    width:92%;
    max-width:620px;
    background:rgba(255,255,255,0.7);
    border-radius:26px;
    padding:34px;
    font-size:22px;
    line-height:2.4;
}
.letter p{
    text-indent:2em;
    margin-bottom:14px;
}
.letter p:first-child{
    text-indent:0;
}

/* 卡片 */
.card{
    width:92%;
    max-width:520px;
    padding:36px;
    background:rgba(255,255,255,0.6);
    border-radius:26px;
    text-align:center;
    font-size:24px;
    line-height:2.6;
}

/* 地图 */
.map{
    display:inline-block;
    padding:10px 22px;
    border-radius:20px;
    color:#8c5cff;
    cursor:pointer;
}
.map:hover{
    box-shadow:0 0 15px rgba(180,120,255,0.6);
}

/* 爱心 */
.heart{
    position:fixed;
    animation:fly 1.8s forwards;
}
@keyframes fly{
    to{transform:translateY(-150px);opacity:0;}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="dots" id="dots"></div>

<audio id="music" src="music.mp3" loop></audio>

<!-- 封面 -->
<div class="page active" id="p1" onclick="nextPage()">
<img src="./cover.jpg" class="cover">
</div>

<!-- 输入 -->
<div class="page" id="p2">
<div class="title">Hyein Invitation</div>
<input id="name" placeholder="Your Name">
<button onclick="go()">OK</button>
</div>

<!-- 信封 -->
<div class="page" id="p3">
<div class="envelope" onclick="openEnvelope(this)">
<div class="flap"></div>
<div class="body"></div>
</div>
<div class="hint">Tap to open 💌</div>
</div>

<!-- 信件 -->
<div class="page" id="p4" onclick="nextPage()">
<div class="letter" id="letter" onclick="event.stopPropagation()"></div>
</div>

<!-- 信息 -->
<div class="page" id="p5">
<div class="card">
💜 Happy Hyein's Day 💜<br>
📅 2026.04.18<br>
📍 <span class="map" onclick="goMap()">益+coffee&tea</span><br>
Dress Code：紫色 / 波点<br>
<button onclick="confirmAttend()">我要来！</button>
</div>
</div>

<script>
let page=1;
let userName="Bunnies";
let opened=false;
let musicStarted=false;

/* ✨ 生成不规则波点 */
function createDots(){
let container=document.getElementById("dots");
for(let i=0;i<45;i++){
let d=document.createElement("div");
d.className="dot";
let size=8+Math.random()*10;
d.style.width=size+"px";
d.style.height=size+"px";
d.style.left=Math.random()*100+"vw";
d.style.top=Math.random()*100+"vh";
d.style.animationDelay=Math.random()*3+"s";
container.appendChild(d);
}
}

window.onload=function(){
document.querySelector(".cover").classList.add("loaded");
createDots();
};

function nextPage(){
if(!musicStarted){
let music=document.getElementById("music");
music.volume=0.4;
music.play().catch(()=>{});
musicStarted=true;
}
document.getElementById("p"+page).classList.remove("active");
page++;
document.getElementById("p"+page).classList.add("active");
updateLetter();
}

function go(){
let name=document.getElementById("name").value;
if(name) userName=name;
nextPage();
}

function openEnvelope(el){
if(!opened){
el.classList.add("open");
opened=true;
}else{
nextPage();
}
}

function updateLetter(){
document.getElementById("letter").innerHTML = `
<p>To 亲爱的 ${userName}：</p>
<p>안녕하세요~ 我是Hyein！🐹</p>
<p>好久不见，大家最近过得好吗？我最近过得超～级幸福，因为……我的生日快到啦！🎂✨</p>
<p>这一次，我想邀请我最爱的你们和我一起度过这个特别的日子！你愿意来吗？我已经开始期待看到你们的笑容了！🥺💖</p>
<p>如果没有办法来也没关系，只要为我送上祝福，我都会超级感动的！因为只要有Bunnies在，每一天都像生日一样幸福～</p>
<p>别忘了：请穿上带有紫色或波点元素的衣服哦～我们一起拍超好看的照片！</p>
<p>那我们那天见啦！不见不散！</p>
<p>사랑해요, Bunnies! 🫶🏻</p>
<p style="text-align:right;margin-top:20px;">Yours,<br>Hyein</p>
`;
}

function goMap(){
window.open("https://surl.amap.com/cYD2lgm1A9q1");
}

function confirmAttend(){
for(let i=0;i<12;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
h.style.top="60vh";
document.body.appendChild(h);
setTimeout(()=>h.remove(),1800);
}
alert("💜 "+userName+" 我们4.18见！");
}
</script>

</body>
</html>
