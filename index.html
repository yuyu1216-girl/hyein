<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Hyein Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Noto+Serif+SC:wght@400;600&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    overflow:hidden;
    font-family:'ZCOOL XiaoWei','Noto Serif SC',serif;
}

/* 背景 */
.bg{
    position:fixed;
    width:100%;
    height:100vh;
    background:#d8c6f0;
}

.bg::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:radial-gradient(circle at 50% 40%, rgba(255,255,255,0.35), transparent 70%);
    animation:glow 6s ease-in-out infinite alternate;
}

@keyframes glow{
    from{opacity:0.3;}
    to{opacity:0.7;}
}

/* 波点（稍微加大） */
.dots{
    position:fixed;
    width:100%;
    height:100%;
    pointer-events:none;

    background-image:
    radial-gradient(circle, rgba(255,255,255,0.9) 7px, transparent 8px);
    background-size:60px 60px;
}

.dots::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;

    background-image:
    radial-gradient(circle, rgba(255,255,255,0.8) 7px, transparent 8px);
    background-size:60px 60px;

    animation:twinkle 3s ease-in-out infinite alternate;
}

@keyframes twinkle{
    from{opacity:0.4;}
    to{opacity:1;filter:blur(2px);}
}

/* 页面 */
.page{
    position:fixed;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    pointer-events:none;
    transition:0.6s;
}

.page.active{
    opacity:1;
    pointer-events:auto;
}

/* 封面 */
.cover{
    width:92%;
    max-width:600px;
    border-radius:20px;
}

/* 输入 */
input{
    padding:18px;
    border-radius:18px;
    border:none;
    width:320px;
    text-align:center;
    font-size:20px;
    font-family:'ZCOOL XiaoWei',serif;
}

/* 标题 */
.title{
    font-family:'Playfair Display',serif;
    font-size:56px;
    color:#caa6ff;
}

/* 信封 */
.envelope{
    width:420px;
    height:240px;
    position:relative;
    cursor:pointer;
}

.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#e6ccff;
    clip-path:polygon(0 0,100% 0,50% 60%);
    transform-origin:top;
    transition:0.6s;
    z-index:2;
}

.body{
    position:absolute;
    width:100%;
    height:100%;
    background:white;
    border-radius:12px;
}

.envelope.open .flap{
    transform:rotateX(180deg);
}

/* 信纸 */
.letter{
    width:92%;
    max-width:600px;
    height:80vh;
    background:linear-gradient(#ffffff,#f8f4ff);
    border-radius:20px;
    padding:30px;

    font-size:19px;
    line-height:2.1;

    overflow-y:auto;

    transform:translateY(60px) scale(0.95);
    opacity:0;
    transition:0.8s;
}

.letter.show{
    transform:translateY(0) scale(1);
    opacity:1;
}

/* 信息页 */
.card{
    width:90%;
    max-width:520px;
    padding:30px;
    background:white;
    border-radius:20px;
    text-align:center;
    font-size:20px;
}

.title{
    font-family:'Playfair Display',serif;
    font-size:56px;
    color:#caa6ff;
}

.map{
    color:#b07cff;
    text-decoration:underline;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="dots"></div>

<audio id="music" src="music.mp3" loop autoplay></audio>

<!-- 封面 -->
<div class="page active" id="p1" onclick="nextPage()">
<img src="cover.jpg" class="cover">
</div>

<!-- 输入 -->
<div class="page" id="p2" onclick="go()">
<div class="title">Hyein Invitation</div>
<input id="name" placeholder="Name" onclick="event.stopPropagation()">
</div>

<!-- 信封 -->
<div class="page" id="p3">
<div class="envelope" onclick="openEnvelope(this)">
<div class="flap"></div>
<div class="body"></div>
</div>
</div>

<!-- 信件 -->
<div class="page" id="p4" onclick="nextPage()">
<div class="letter" id="letter" onclick="event.stopPropagation()"></div>
</div>

<!-- 信息 -->
<div class="page" id="p5">
<div class="card">
💜 Happy Hyein's Day💜<br><br>
📅 2026.04.18<br><br>
📍 <span class="map" onclick="goMap()">广州 · 益+coffee&tea</span><br><br>
Dress Code：紫色 / 波点<br><br>
<button onclick="confirmAttend()">我要来！</button>
</div>
</div>

<script>
let page=1;
let userName="Bunnies";
let opened=false;

/* 音乐 */
window.onload=()=>{
let music=document.getElementById("music");
music.volume=0.4;
music.play().catch(()=>{});
}

function nextPage(){
document.getElementById("p"+page).classList.remove("active");
page++;
let next=document.getElementById("p"+page);
next.classList.add("active");

if(page===4){
setTimeout(()=>{
document.querySelector(".letter").classList.add("show");
},200);
}

updateLetter();
}

function go(){
let name=document.getElementById("name").value;
if(name!=="") userName=name;
nextPage();
}

/* ⭐ 两段式信封 */
function openEnvelope(el){
if(!opened){
el.classList.add("open");
opened=true;
}else{
nextPage();
}
}

function updateLetter(){
document.getElementById("letter").innerHTML = `
<p>To 亲爱的 ${userName}：</p>
<p>안녕하세요~ 我是Hyein！🐹</p>
<p>好久不见，大家最近过得好吗？我最近过得超～级幸福，因为……我的生日快到啦！🎂✨</p>
<p>这一次，我想邀请我最爱的你们和我一起度过这个特别的日子！你愿意来吗？我已经开始期待看到你们的笑容了！🥺💖</p>
<p>如果没有办法来也没关系，只要为我送上祝福，我都会超级感动的！因为只要有Bunnies在，每一天都像生日一样幸福～</p>
<p>别忘了：请穿上带有紫色或波点元素的衣服哦～我们一起拍超好看的照片！</p>
<p>那我们那天见啦！不见不散！</p>
<p>사랑해요, Bunnies! 🫶🏻</p>
<p style="text-align:right;">Yours,<br>Hyein</p>
`;
}

function goMap(){
window.open("https://surl.amap.com/cYD2lgm1A9q1");
}

function confirmAttend(){
alert("💜 "+userName+" 我们4.18见！");
}
</script>

</body>
</html>
