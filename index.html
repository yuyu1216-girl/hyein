<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 字体 -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;600&family=Noto+Serif:wght@400;600&display=swap" rel="stylesheet">

<title>Hyein Invitation</title>

<style>
body {
    margin: 0;
    font-family: 'Noto Sans', sans-serif;
    overflow: hidden;
    color: #333;
}

/* 页面结构 */
.container {
    height: 100vh;
    width: 100%;
    position: relative;
}

.page {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    transition: 0.7s ease;
}

.hidden {
    transform: translateY(100%);
}

/* 背景 */
.bg {
    background: url('bg.jpg');
    background-size: cover;
    background-position: center;
}

/* 封面 */
.cover {
    display: flex;
    justify-content: center;
    align-items: center;
    background: url('bg.jpg');
    background-size: cover;
    background-position: center;
}

.cover img {
    width: 90%;
    height: 90%;
    object-fit: contain;
}
    
/* 卡片（高级感关键✨） */
.card {
    width: 88%;
    max-width: 420px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(10px);
    border-radius: 22px;
    padding: 28px 24px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.18);
}

/* 标题 */
h2, h3 {
    font-family: 'Noto Serif', serif;
    text-align: center;
    margin-bottom: 16px;
    color: #5b4bff;
    letter-spacing: 1px;
}

/* 输入框 */
.input {
    padding: 12px;
    width: 80%;
    border-radius: 20px;
    border: 1px solid #ddd;
    text-align: center;
    font-size: 14px;
}

/* 按钮 */
.btn {
    margin-top: 18px;
    padding: 12px;
    width: 70%;
    background: linear-gradient(135deg, #7b5cff, #9f8bff);
    color: white;
    border: none;
    border-radius: 25px;
    font-size: 14px;
}

/* 信件（重点✨） */
.letter {
    font-family: 'Noto Serif', serif;
    font-size: 15px;
    line-height: 1.9;
    letter-spacing: 0.5px;
    color: #444;
    white-space: pre-line;
    padding: 10px 5px;
}

.letter p {
    text-indent: 2em;
    margin: 10px 0;
}

.letter p:first-child {
    text-indent: 0;
    font-weight: 600;
}
    
/* 信息卡片 */
.info {
    font-size: 14px;
    line-height: 1.8;
    text-align: center;
}

/* 小标题 */
.label {
    color: #7b5cff;
    font-weight: 600;
}
</style>
</head>

<body>

<audio id="music" src="music.mp3" loop></audio>

<div class="container">

<!-- 输入页 -->
<div class="page bg">
    <div class="card">
        <h3>💜 Bunnies Invitation 💜</h3>
        <input class="input" id="nameInput" placeholder="请输入你的名字">
        <div style="text-align:center;">
            <button class="btn" onclick="start()">进入邀请函</button>
        </div>
    </div>
</div>

<!-- 封面 -->
<div class="page hidden cover" onclick="nextPage()">
    <img src="cover.jpg">
</div>

<!-- 信件 -->
<div class="page hidden bg">
    <div class="card">
        <div class="letter" id="letter"></div>
    </div>
</div>

<!-- 活动信息 -->
<div class="page hidden bg">
    <div class="card info">

    <div class="label">📍 益+coffee&tea</div>
    <br>

    📅 2026.04.18  
    <br><br>

    💜 Hyein Birthday Event  
    <br><br>

    Dress Code：紫色 / 波点  

    <br><br>

    <a href="https://surl.amap.com/cYD2lgm1A9q1" target="_blank">
        <button class="btn">📍 点击导航</button>
    </a>

</div>

<!-- RSVP -->
<div class="page hidden bg">
    <div class="card" style="text-align:center;">
        <h3>💌 要来吗？</h3>

        <button class="btn" onclick="alert('💜 '+userName+' 我们4.18见！')">
            我要来！
        </button>
    </div>
</div>

</div>

<script>
let pages = document.querySelectorAll('.page');
let current = 0;
let userName = "Bunnies";

/* 开始 */
function start(){
    let input = document.getElementById("nameInput").value;
    if(input){
        userName = input;
    }

    let audio = document.getElementById("music");

    audio.play().then(()=>{
        console.log("播放成功");
    }).catch(()=>{
        console.log("被拦截");
    });

    nextPage();
}

/* 翻页 */
function nextPage(){
    if(current < pages.length -1){
        pages[current].classList.add('hidden');
        current++;
        pages[current].classList.remove('hidden');
        updateLetter();
    }
}

/* 信件内容（优化排版✨） */
function updateLetter(){
    document.getElementById("letter").innerHTML = `
<p>To 亲爱的 ${userName}：</p>

<p>안녕하세요~ 我是 Hyein！🐹<br>
好久不见，最近过得好吗？</p>

<p>我最近过得超～级幸福，<br>
因为我的生日快到啦！</p>

<p>这一次，我想邀请最爱的你<br>
一起度过这个特别的日子 💜</p>

<p>你愿意来吗？<br>
我已经开始期待见到你了！</p>

<p>如果不能来也没关系，<br>
你的祝福我一定会收到的～</p>

<p>那我们那天见啦，不见不散！</p>

<p>사랑해요 🫶🏻<br>
Yours,<br>
Hyein</p>
`;
}

/* 滑动翻页 */
let startY=0;
document.addEventListener("touchstart",e=>{
    startY=e.touches[0].clientY;
});
document.addEventListener("touchend",e=>{
    let endY=e.changedTouches[0].clientY;
    if(startY-endY>50){
        nextPage();
    }
});
</script>

</body>
</html>
