<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 字体 -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Playfair+Display&family=Dancing+Script&display=swap" rel="stylesheet">

<title>Invitation</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #e9dcff;
    font-family: 'Noto Serif SC', serif;
}

/* 波点背景 */
.bg {
    background-color: #e9dcff;
    background-image: radial-gradient(white 2px, transparent 2px);
    background-size: 24px 24px;
}

/* 页面 */
.page {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    transition: 0.8s;
}

.hidden {
    transform: translateY(100%);
}

/* 信封 */
.envelope {
    width: 220px;
    height: 140px;
    background: #fff;
    position: relative;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #d7c2ff;
    clip-path: polygon(0 0, 100% 0, 50% 60%);
    transform-origin: top;
    transition: 0.8s;
}

.open .flap {
    transform: rotateX(180deg);
}

.envelope-text {
    margin-top: 20px;
    color: #6a4ed9;
    font-size: 14px;
}

/* 卡片 */
.card {
    width: 90%;
    max-width: 420px;
    background: rgba(255,255,255,0.9);
    border-radius: 24px;
    padding: 30px;
    text-align: center;
}

/* 输入 */
.input {
    padding: 12px;
    width: 80%;
    border-radius: 20px;
    border: none;
    text-align: center;
}

/* 按钮 */
.btn {
    margin-top: 18px;
    padding: 12px;
    width: 70%;
    background: linear-gradient(135deg,#9b7bff,#c3a6ff);
    border: none;
    border-radius: 25px;
    color: white;
}

/* 标题 */
.title {
    font-family: 'Dancing Script', cursive;
    font-size: 40px;
    color: #b799ff;
}

.big {
    font-size: 36px;
    color: #a07bff;
}

/* 信件 */
.letter {
    color: #4b3c8c;
    line-height: 2.2;
    font-size: 17px;
}

.letter p {
    margin: 14px 0;
}

.signature {
    margin-top: 30px;
    text-align: right;
    font-family: 'Playfair Display', serif;
}

/* 信息 */
.info {
    line-height: 2;
    color: #4b3c8c;
}

/* 淡入 */
.fade {
    animation: fadeIn 1.2s forwards;
}

@keyframes fadeIn {
    from {opacity:0}
    to {opacity:1}
}
</style>
</head>

<body>

<audio id="music" src="music.mp3" loop></audio>

    <div class="page" id="coverPage" onclick="enterMain()">
    <img src="cover.jpg" style="
        width:100%;
        height:100%;
        object-fit:contain;
        background:#e9dcff;
    ">
</div>
<div class="page bg" id="page0">
    <div class="card">
        <div class="title">Invitation</div>
        <div class="big">邀请函</div>
        <br>
        <input class="input" id="nameInput" placeholder="输入你的名字">
        <br>
        <button class="btn" onclick="openEnvelope()">进入</button>
    </div>
</div>

<div class="page bg hidden" id="page1">
    <div class="envelope" id="env" onclick="openLetter()">
        <div class="flap"></div>
    </div>
    <div class="envelope-text">点击打开Hyein的信 💌</div>
</div>

<div class="page bg hidden" id="page2">
    <div class="card letter" id="letter"></div>
</div>

<div class="page bg hidden" id="page3">
    <div class="card info">
        📍 益+coffee&tea  
        <br>
        📅 2026.04.18  
        <br><br>
        💜 Hyein Birthday Event  
        <br><br>
        <a href="https://surl.amap.com/cYD2lgm1A9q1" target="_blank">
            <button class="btn">导航</button>
        </a>
    </div>
</div>

<div class="page bg hidden" id="page4">
    <div class="card">
        💌 要来吗？
        <br><br>
        <button class="btn" onclick="alert('💜 '+userName+' 我等你！')">我要来！</button>
    </div>
</div>

<script>
let current=0;
let userName="Bunnies";

/* 音乐淡入 */
function playMusic(){
    let audio=document.getElementById("music");
    audio.volume=0;
    audio.play();
    let v=0;
    let fade=setInterval(()=>{
        if(v<1){
            v+=0.05;
            audio.volume=v;
        }else{
            clearInterval(fade);
        }
    },200);
}

/* 打开信封前 */
function openEnvelope(){
    let input=document.getElementById("nameInput").value;
    if(input){userName=input;}
    nextPage();
    playMusic();
}

/* 打开信封动画 */
function openLetter(){
    document.getElementById("env").classList.add("open");
    setTimeout(()=>{
        nextPage();
    },800);
}

/* 翻页 */
function nextPage(){
    document.getElementById("page"+current).classList.add("hidden");
    current++;
    document.getElementById("page"+current).classList.remove("hidden");
    updateLetter();
}

/* 信件 */
function updateLetter(){
document.getElementById("letter").innerHTML=`
<p>To 亲爱的 ${userName}：</p>

<p>안녕하세요~ 我是 Hyein！🐹</p>

<p>好久不见，最近过得好吗？</p>

<p>我最近过得超～级幸福，<br>
因为我的生日快到啦！ 🎂✨</p>

<p>这一次，我想邀请最爱的你<br>
一起度过这个特别的日子 💜</p>

<p>你愿意来吗？<br>
我已经开始期待见到你了！ 🥺💖</p>

<p class="signature">
Yours,<br>
Hyein
</p>
`;
}

/* 点击翻页 */
document.addEventListener("click",()=>{
    if(current>1){nextPage();}
});
</script>

</body>
</html>
