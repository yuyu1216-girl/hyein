<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hyein's Invitation</title>

<!-- 分享卡片 -->
<meta property="og:title" content="🐹 Hyein's Invitation 🐹">
<meta property="og:description" content="✨ Open it ✨ ">
<meta property="og:image" content="./cover.jpg">

<!-- 预加载 & 预连接优化 -->
<link rel="preload" as="image" href="./cover.jpg" fetchpriority="high">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* 彻底禁止微信字体放大 */
html {
    -webkit-text-size-adjust: 100% !important;
    text-size-adjust: 100% !important;
    font-size: 16px;
}
body {
    -webkit-text-size-adjust: 100% !important;
    text-size-adjust: 100% !important;
    font-size: 1rem;
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: 'Playfair Display', 'Noto Serif SC', serif;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* 背景层 - 默认纯色香芋紫 */
.bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background: #e2d5f0;
    transition: filter 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.9s ease-out;
    z-index: 0;
}
/* 封面模式：显示图片 + 模糊 + 缩放 */
.bg.cover-mode {
    background: #e2d5f0 url('./cover.jpg') center/cover no-repeat;
    filter: blur(20px);
    transform: scale(1.1);
}
.bg.cover-mode::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(226, 213, 240, 0.2);
    transition: opacity 0.9s ease-out;
    opacity: 1;
}
/* 雾层散开（仅封面模式生效） */
.bg.cover-mode.clear {
    filter: blur(0px);
    transform: scale(1);
}
.bg.cover-mode.clear::after {
    opacity: 0;
}

/* 波点装饰 */
.dots {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
    transition: opacity 0.5s ease;
}
.dots::before,
.dots::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255, 255, 245, 0.9) 10px, transparent 11px);
    background-size: 85px 85px;
    filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.7));
    animation: breath 5s ease-in-out infinite alternate;
}
.dots::after {
    transform: translate(42px, 42px);
    animation-delay: -1s;
}
@keyframes breath {
    0% {
        opacity: 0.4;
        filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.3));
    }
    100% {
        opacity: 0.95;
        filter: drop-shadow(0 0 14px rgba(255, 255, 255, 0.9));
    }
}
/* 第一页波点透明度降低 */
.dots.fade-dots::before,
.dots.fade-dots::after {
    opacity: 0.25;
    animation: breathFade 5s ease-in-out infinite alternate;
}
@keyframes breathFade {
    0% {
        opacity: 0.15;
        filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.2));
    }
    100% {
        opacity: 0.45;
        filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.6));
    }
}

/* 页面容器 */
.page {
    position: fixed;
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
    z-index: 10;
    padding: 20px;
    overflow-y: auto;
}
.page.active {
    opacity: 1;
    pointer-events: auto;
}

/* 封面图 */
.cover {
    width: 92%;
    max-width: 640px;
    border-radius: 32px;
    box-shadow: 0 25px 40px rgba(0,0,0,0.15);
    cursor: pointer;
    transition: transform 0.3s ease, opacity 0.6s ease;
    will-change: transform, opacity;
    opacity: 0;
    transform: scale(0.98);
}
.cover.loaded {
    opacity: 1;
    transform: scale(1);
    animation: coverGlow 0.7s ease-out;
}
@keyframes coverGlow {
    0% { opacity: 0; transform: scale(0.96); filter: blur(2px); }
    100% { opacity: 1; transform: scale(1); filter: blur(0); }
}
.cover:hover {
    transform: scale(1.01);
}

/* 标题 */
.title {
    font-size: 3rem;
    color: #b198cf;
    text-shadow: 0 2px 8px rgba(0,0,0,0.08);
    letter-spacing: 2px;
    margin-bottom: 0.5rem;
    text-align: center;
}

/* 输入框 */
.input-name {
    padding: 1rem 1.2rem;
    border-radius: 48px;
    border: none;
    width: 80%;
    max-width: 340px;
    text-align: center;
    font-size: 1.2rem;
    background: rgba(245, 240, 255, 0.85);
    backdrop-filter: blur(4px);
    font-family: inherit;
    box-shadow: 0 5px 12px rgba(0,0,0,0.08);
}
.input-name:focus {
    outline: none;
    background: white;
    box-shadow: 0 0 0 3px rgba(177, 152, 207, 0.4);
}

/* 按钮 */
.btn {
    margin-top: 1.5rem;
    padding: 0.8rem 2.2rem;
    border: none;
    background: rgba(170, 140, 210, 0.85);
    color: white;
    border-radius: 60px;
    font-size: 1.2rem;
    font-weight: 500;
    cursor: pointer;
    transition: 0.25s;
    backdrop-filter: blur(4px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}
.btn:hover {
    transform: scale(1.03);
    background: #bb9fdf;
    box-shadow: 0 8px 20px rgba(130, 100, 170, 0.3);
}

/* 信封容器 */
.envelope {
    width: 90%;
    max-width: 360px;
    aspect-ratio: 360 / 220;
    position: relative;
    cursor: pointer;
    border-radius: 14px;
    background: #fff7ef;
    box-shadow: 0 20px 30px rgba(0,0,0,0.12);
    transition: transform 0.2s;
    animation: gentleFloat 3s ease-in-out infinite;
}
@keyframes gentleFloat {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
}
.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #cbb2e6;
    clip-path: polygon(0 0, 100% 0, 50% 92%);
    transform-origin: top;
    transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    border-radius: 14px 14px 0 0;
    z-index: 3;
}
.body {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #fffaf2;
    border-radius: 14px;
    box-shadow: inset 0 1px 4px rgba(0,0,0,0.03);
}
.body::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, transparent 49%, rgba(0,0,0,0.02) 50%, transparent 51%),
                linear-gradient(225deg, transparent 49%, rgba(0,0,0,0.02) 50%, transparent 51%);
    pointer-events: none;
}
.envelope.open .flap {
    transform: rotateX(180deg);
}
.hint {
    margin-top: 1.5rem;
    font-size: 1rem;
    color: #b6a1d4;
    font-weight: 500;
    background: rgba(245, 240, 255, 0.6);
    padding: 0.3rem 1rem;
    border-radius: 60px;
    backdrop-filter: blur(4px);
}

/* 信纸 */
.letter {
    width: 92%;
    max-width: 620px;
    background: rgba(255, 250, 245, 0.92);
    backdrop-filter: blur(6px);
    border-radius: 36px;
    padding: 2rem 2rem;
    font-size: 1.05rem;
    line-height: 1.9;
    overflow-wrap: break-word;
    word-break: break-word;
    box-shadow: 0 20px 35px rgba(0,0,0,0.12);
    border: 1px solid rgba(230, 220, 255, 0.6);
}
.letter p {
    text-indent: 2em;
    margin-bottom: 0.8rem;
}
.letter p:first-child {
    text-indent: 0;
}
.letter p:last-child {
    margin-bottom: 0;
}

/* 卡片页 */
.card {
    width: 92%;
    max-width: 520px;
    padding: 2rem 1.8rem;
    background: rgba(250, 245, 255, 0.88);
    backdrop-filter: blur(12px);
    border-radius: 48px;
    text-align: center;
    font-size: 1.2rem;
    line-height: 2.4;
    box-shadow: 0 20px 30px rgba(0,0,0,0.12);
    border: 1px solid rgba(220, 205, 255, 0.6);
}
.countdown-box {
    background: rgba(177, 152, 207, 0.2);
    border-radius: 60px;
    padding: 0.3rem 1rem;
    display: inline-block;
    margin: 0.6rem 0;
    font-weight: 500;
    font-size: 1rem;
}
.map-link {
    display: inline-block;
    padding: 0.4rem 1.2rem;
    border-radius: 40px;
    background: rgba(170, 140, 210, 0.2);
    color: #aa82cf;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}
.map-link:hover {
    background: rgba(170, 140, 210, 0.4);
    transform: scale(1.02);
}
.heart-fly {
    position: fixed;
    font-size: 1.8rem;
    pointer-events: none;
    z-index: 200;
    animation: flyHeart 1.4s forwards;
}
@keyframes flyHeart {
    0% {
        transform: translateY(0) scale(0.6);
        opacity: 1;
    }
    100% {
        transform: translateY(-180px) scale(1.2);
        opacity: 0;
    }
}

/* 响应式 */
@media (max-width: 550px) {
    html {
        font-size: 14px;
    }
    .title {
        font-size: 2.4rem;
    }
    .letter {
        font-size: 0.95rem;
        padding: 1.4rem;
    }
    .card {
        font-size: 1rem;
        padding: 1.4rem;
    }
    .btn {
        font-size: 1rem;
        padding: 0.6rem 1.8rem;
    }
}
</style>
</head>
<body>

<div class="bg" id="bgLayer"></div>
<div class="dots" id="dotsLayer"></div>

<audio id="bgMusic" loop preload="auto"></audio>

<!-- 封面页 P1 -->
<div class="page active" id="page1">
    <img src="./cover.jpg" class="cover" alt="Hyein Invitation" 
         fetchpriority="high" 
         loading="eager"
         id="coverImg">
</div>

<!-- 输入昵称 P2 -->
<div class="page" id="page2">
    <div class="title">Invitation</div>
    <input type="text" id="guestName" class="input-name" placeholder="Nickname" autocomplete="off">
    <button class="btn" id="okNameBtn">OK</button>
</div>

<!-- 信封页 P3 -->
<div class="page" id="page3">
    <div class="envelope" id="envelopeBox">
        <div class="flap"></div>
        <div class="body"></div>
    </div>
    <div class="hint">💌 Open it 💌</div>
</div>

<!-- 信件内容 P4 -->
<div class="page" id="page4">
    <div class="letter" id="letterContent"></div>
</div>

<!-- 派对详情 P5 -->
<div class="page" id="page5">
    <div class="card">
        💜 Happy Hyein's Day 💜<br>
         2026.04.18<br>
        📍 <span class="map-link" id="mapTrigger">益+ coffee & tea</span>📍<br>
        🎀 Dress Code：紫色 / 波点元素🎀<br>
        <div class="countdown-box" id="countdownDisplay">⏳ 计算中...</div>
        <button class="btn" id="confirmBtn" style="margin-top: 1rem;">我要来</button>
    </div>
</div>

<script>
// ---------- DOM 元素 ----------
const bgLayer = document.getElementById('bgLayer');
const dotsLayer = document.getElementById('dotsLayer');
const pages = [document.getElementById('page1'), document.getElementById('page2'), document.getElementById('page3'), document.getElementById('page4'), document.getElementById('page5')];
let currentPageIdx = 0;
let userName = "Bunnies";
let envelopeOpened = false;
let musicPlaying = false;
let fogDissolved = false;
let coverLoaded = false;
let bgImageLoaded = false;
let musicFadeInterval = null;

// ---------- 音乐淡入 ----------
function fadeInMusic(audio, targetVolume = 0.35, duration = 1500) {
    if (musicFadeInterval) clearInterval(musicFadeInterval);
    audio.volume = 0;
    audio.play().catch(err => console.log('自动播放被阻止:', err));
    const stepTime = 50;
    const steps = duration / stepTime;
    const stepVolume = targetVolume / steps;
    let currentStep = 0;
    musicFadeInterval = setInterval(() => {
        currentStep++;
        let newVol = stepVolume * currentStep;
        if (newVol >= targetVolume) {
            newVol = targetVolume;
            clearInterval(musicFadeInterval);
            musicFadeInterval = null;
        }
        audio.volume = newVol;
    }, stepTime);
}

// ---------- 预加载背景图 ----------
function preloadBgImage() {
    const img = new Image();
    img.onload = () => {
        bgImageLoaded = true;
        if (coverLoaded && bgLayer.classList.contains('cover-mode') && !fogDissolved) {
            startFogDissolve();
            fogDissolved = true;
        }
    };
    img.onerror = () => {
        bgImageLoaded = true;
        if (coverLoaded && bgLayer.classList.contains('cover-mode') && !fogDissolved) {
            startFogDissolve();
            fogDissolved = true;
        }
    };
    img.src = './cover.jpg';
}

// ---------- 背景封面模式切换 ----------
function setBgCoverMode(enable) {
    if (enable) {
        bgLayer.classList.add('cover-mode');
    } else {
        bgLayer.classList.remove('cover-mode');
        bgLayer.classList.remove('clear');
    }
}

function updateBgMode() {
    const isCoverPage = currentPageIdx === 0;
    setBgCoverMode(isCoverPage);
}

// ---------- 封面图加载处理 ----------
const coverImg = document.getElementById('coverImg');
function handleCoverLoaded() {
    if (coverLoaded) return;
    coverLoaded = true;
    coverImg.classList.add('loaded');
    if (bgImageLoaded && bgLayer.classList.contains('cover-mode') && !fogDissolved) {
        startFogDissolve();
        fogDissolved = true;
    }
}
function handleCoverError() {
    const svgData = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 1000'%3E%3Crect width='100%25' height='100%25' fill='%23e2d5f0'/%3E%3Ctext x='50%25' y='45%25' font-size='32' font-family='monospace' fill='%23aa82cf' text-anchor='middle'%3E🐹 Hyein's Party 🐹%3C/text%3E%3Ctext x='50%25' y='55%25' font-size='24' fill='%23b198cf' text-anchor='middle'%3E💜 Happy Hyein's Day 💜%3C/text%3E%3C/svg%3E`;
    coverImg.src = svgData;
    handleCoverLoaded();
}
if (coverImg) {
    if (coverImg.complete && coverImg.naturalWidth !== 0) {
        handleCoverLoaded();
    } else {
        coverImg.addEventListener('load', handleCoverLoaded);
        coverImg.addEventListener('error', handleCoverError);
    }
} else {
    setBgCoverMode(false);
}

function startFogDissolve() {
    if (bgLayer && bgLayer.classList.contains('cover-mode') && !bgLayer.classList.contains('clear')) {
        bgLayer.classList.add('clear');
    }
}

// ---------- 立即启动音乐（页面加载后直接播放）----------
function initAutoPlayMusic() {
    const music = document.getElementById('bgMusic');
    if (!music) return;
    // 设置音频源（避免页面加载时预下载大文件）
    music.src = 'music.mp3';
    // 立即播放并淡入
    if (!musicPlaying) {
        fadeInMusic(music, 0.35, 1500);
        musicPlaying = true;
    }
}

// ---------- 页面切换，控制波点透明度 ----------
function updateDotsOpacity() {
    if (!dotsLayer) return;
    if (currentPageIdx === 0) {
        dotsLayer.classList.add('fade-dots');
    } else {
        dotsLayer.classList.remove('fade-dots');
    }
}

function goToPage(index) {
    if (index < 0 || index >= pages.length) return;
    pages.forEach(page => page.classList.remove('active'));
    pages[index].classList.add('active');
    currentPageIdx = index;
    updateBgMode();
    updateDotsOpacity();
    if (index === 3) renderLetter();
    if (index === 4) updateCountdownDisplay();
}

function nextPage() {
    if (currentPageIdx === 0) {
        goToPage(1);
    } 
    else if (currentPageIdx === 1) {
        const nameInput = document.getElementById('guestName');
        let inputName = nameInput.value.trim();
        userName = inputName !== "" ? inputName : "Bunnies";
        goToPage(2);
    }
    else if (currentPageIdx === 2) {
        if (!envelopeOpened) {
            const hintDiv = document.querySelector('#page3 .hint');
            hintDiv.style.transform = "scale(1.05)";
            setTimeout(() => { hintDiv.style.transform = ""; }, 300);
            return;
        }
        goToPage(3);
    }
    else if (currentPageIdx === 3) {
        goToPage(4);
    }
}

function renderLetter() {
    const letterDiv = document.getElementById('letterContent');
    if (!letterDiv) return;
    letterDiv.innerHTML = `
        <p>To 亲爱的 ${userName}：</p>
        <p>안녕하세요~ 我是Hyein！🐹</p>
        <p>好久不见，大家最近过得好吗？我最近过得超～级幸福，因为……我的生日快到啦！🎂✨</p>
        <p>这一次，我想邀请我最爱的你们和我一起度过这个特别的日子！你愿意来吗？我已经开始期待看到你们的笑容了！🥺💖</p>
        <p>如果没有办法来也没关系，只要为我送上祝福，我都会超级感动的！因为只要有Bunnies在，每一天都像生日一样幸福～</p>
        <p>别忘了：请穿上带有紫色或波点元素的衣服哦～我们一起拍超好看的照片！</p>
        <p>那我们那天见啦！不见不散！</p>
        <p>사랑해요, Bunnies! 🫶🏻</p>
        <p style="text-align:right; margin-top:22px;">Yours,<br>Hyein</p>
    `;
}

function updateCountdownDisplay() {
    const targetDate = new Date(2026, 3, 18, 0, 0, 0);
    const now = new Date();
    const diff = targetDate - now;
    const countdownEl = document.getElementById('countdownDisplay');
    if (!countdownEl) return;
    if (diff <= 0) {
        countdownEl.innerHTML = "🎉 就是今天！Hyein's Day 🎉";
        return;
    }
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (86400000)) / (3600000));
    const mins = Math.floor((diff % 3600000) / 60000);
    countdownEl.innerHTML = `⏳ 倒计时：${days}天 ${hours}小时 ${mins}分`;
}

let countdownInterval = null;
function startCountdownTimer() {
    if (countdownInterval) clearInterval(countdownInterval);
    updateCountdownDisplay();
    countdownInterval = setInterval(updateCountdownDisplay, 1000);
}

function openMap() {
    window.open("https://surl.amap.com/cYD2lgm1A9q1", "_blank");
}

function confirmAttendance() {
    for (let i = 0; i < 20; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart-fly';
        heart.innerHTML = ['💜', '💖', '🐹', '✨', '🐳', '🎀'][Math.floor(Math.random() * 6)];
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.bottom = '10vh';
        heart.style.fontSize = 1.5 + Math.random() * 1.2 + 'rem';
        heart.style.position = 'fixed';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1400);
    }
    alert(`🍓 ${userName}，我们4.18见！💜`);
}

function setupEnvelope() {
    const envelope = document.getElementById('envelopeBox');
    if (!envelope) return;
    envelope.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!envelopeOpened) {
            envelope.classList.add('open');
            envelopeOpened = true;
            const hintMsg = document.querySelector('#page3 .hint');
            if (hintMsg) hintMsg.innerHTML = "Click it";
        } else {
            nextPage();
        }
    });
}

function bindEvents() {
    const coverImgClick = document.querySelector('#page1 .cover');
    if (coverImgClick) coverImgClick.addEventListener('click', () => nextPage());
    const okBtn = document.getElementById('okNameBtn');
    if (okBtn) okBtn.addEventListener('click', () => nextPage());
    const nameInput = document.getElementById('guestName');
    if (nameInput) nameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') nextPage(); });
    const pageLetter = document.getElementById('page4');
    if (pageLetter) pageLetter.addEventListener('click', () => nextPage());
    const mapSpan = document.getElementById('mapTrigger');
    if (mapSpan) mapSpan.addEventListener('click', openMap);
    const confirmBtn = document.getElementById('confirmBtn');
    if (confirmBtn) confirmBtn.addEventListener('click', confirmAttendance);
}

// 页面加载完成后立即播放音乐并执行其他初始化
window.addEventListener('load', () => {
    preloadBgImage();
    setupEnvelope();
    bindEvents();
    startCountdownTimer();
    renderLetter();
    updateBgMode();
    updateDotsOpacity();
    // 立即启动音乐（淡入）
    initAutoPlayMusic();
    
    // 兜底：如果封面图未触发loaded，2.5秒后强制显示
    setTimeout(() => {
        if (!coverLoaded) {
            coverImg.classList.add('loaded');
            coverLoaded = true;
        }
        if (!fogDissolved && bgLayer.classList.contains('cover-mode')) {
            startFogDissolve();
            fogDissolved = true;
        }
    }, 2500);
});

// 微信内WeixinJSBridgeReady事件也触发一次，确保自动播放
if (typeof WeixinJSBridge !== 'undefined') {
    document.addEventListener('WeixinJSBridgeReady', () => {
        if (!musicPlaying) initAutoPlayMusic();
    });
} else {
    document.addEventListener('WeixinJSBridgeReady', () => {
        if (!musicPlaying) initAutoPlayMusic();
    });
}
</script>
</body>
</html>
