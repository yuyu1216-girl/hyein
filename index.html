<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC&display=swap" rel="stylesheet">

<title>Hyein Invitation</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:'Noto Serif SC',serif;
    background:#e8dbff;
}

/* 🌫️ 雾 */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle at 50% 30%, #ffffff55, transparent 60%);
    filter:blur(40px);
    pointer-events:none;
}

/* ✨ 光 */
body::after{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(180deg,#ffffff20,#ffffff05);
    pointer-events:none;
}

/* 💜 波点 */
.bg{
    background:#e8dbff;
    position:relative;
}

.bg::after{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:radial-gradient(circle,#ffffff40 8px,transparent 8px);
    background-size:120px 120px;
    animation:move 25s linear infinite;
}

@keyframes move{
    from{transform:translateY(0)}
    to{transform:translateY(-200px)}
}

/* 页面 */
.page{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    transition:0.8s;
}

.hidden{
    transform:translateY(100%);
}

/* 卡片 */
.card{
    width:92%;
    max-width:560px;
    background:rgba(255,255,255,0.65);
    backdrop-filter:blur(20px);
    border-radius:26px;
    padding:34px;
    box-shadow:0 0 80px rgba(160,120,255,0.25);
}

/* 输入框 */
.input{
    padding:12px;
    border-radius:20px;
    border:1px solid #ddd;
    width:70%;
    text-align:center;
}

/* 按钮 */
.btn{
    margin-top:20px;
    padding:12px;
    width:70%;
    border:none;
    border-radius:25px;
    background:#9b7bff;
    color:white;
}

/* 封面 */
.cover img{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* 信封 */
.envelope{
    width:360px;
    height:230px;
    background:white;
    border-radius:18px;
    cursor:pointer;
    position:relative;
    animation:glow 3s infinite alternate;
}

@keyframes glow{
    from{box-shadow:0 0 30px rgba(140,100,255,0.2);}
    to{box-shadow:0 0 80px rgba(200,160,255,0.5);}
}

.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#d8c5ff;
    clip-path:polygon(0 0,100% 0,50% 65%);
    transform-origin:top;
    transition:0.8s;
}

.open .flap{
    transform:rotateX(180deg);
}

/* 信件 */
.letter{
    font-size:17px;
    line-height:2.2;
    color:#3f2b7a;
    text-align:left;
}

.letter p{
    text-indent:2em;
    margin:12px 0;
}

.letter p:first-child{
    text-indent:0;
    font-weight:600;
}

.signature{
    text-align:right;
}

/* 💜 弹窗 */
#popup{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    justify-content:center;
    align-items:center;
}

.popupBox{
    background:rgba(255,255,255,0.8);
    backdrop-filter:blur(20px);
    padding:30px;
    border-radius:20px;
    text-align:center;
    color:#5a3fd1;
    width:70%;
    max-width:300px;
}
</style>
</head>

<body>

<audio id="music" src="music.mp3" loop></audio>

<!-- 输入 -->
<div class="page bg" id="page0">
    <div class="card" style="text-align:center;">
        <h3 style="color:#6d52d9;">💜 Bunnies Invitation 💜</h3>
        <input class="input" id="nameInput" placeholder="请输入你的名字">
        <button class="btn" onclick="start()">进入邀请函</button>
    </div>
</div>

<!-- 封面 -->
<div class="page cover hidden" id="page1" onclick="nextPage()">
    <img src="cover.jpg">
</div>

<!-- 信封 -->
<div class="page bg hidden" id="page2">
    <div class="envelope" id="env" onclick="openEnvelope()">
        <div class="flap"></div>
    </div>
</div>

<!-- 信件 -->
<div class="page bg hidden" id="page3" onclick="nextPage()">
    <div class="card letter" id="letter"></div>
</div>

<!-- 信息 -->
<div class="page bg hidden" id="page4" onclick="nextPage()">
    <div class="card">
        📍 广州 · 益+coffee&tea<br><br>
        📅 2026.04.18<br><br>
        💜 Hyein Birthday Event<br><br>
        Dress Code：紫色 / 波点
    </div>
</div>

<!-- RSVP -->
<div class="page bg hidden" id="page5">
    <div class="card">
        💌 要来吗？<br><br>
        <button class="btn" onclick="showPopup()">我要来！</button>
    </div>
</div>

<!-- 弹窗 -->
<div id="popup">
    <div class="popupBox">
        💜 <span id="popupText"></span><br><br>
        <button class="btn" onclick="closePopup()">好的！</button>
    </div>
</div>

<script>
let current=0;
let userName="Bunnies";

/* 音乐 */
function playMusic(){
    let a=document.getElementById("music");
    a.volume=0;
    a.play().catch(()=>{});
    let v=0;
    let fade=setInterval(()=>{
        if(v<1){v+=0.05;a.volume=v;}else clearInterval(fade);
    },200);
}

/* 开始 */
function start(){
    let input=document.getElementById("nameInput").value;
    if(input){userName=input;}
    playMusic();
    nextPage();
}

/* 翻页 */
function nextPage(){
    document.getElementById("page"+current).classList.add("hidden");
    current++;
    document.getElementById("page"+current).classList.remove("hidden");
    if(current===3){updateLetter();}
}

/* 信封 */
function openEnvelope(){
    document.getElementById("env").classList.add("open");
    document.body.style.background="#fff";
    setTimeout(()=>{
        document.body.style.background="#e8dbff";
        nextPage();
    },400);
}

/* 信件 */
function updateLetter(){
document.getElementById("letter").innerHTML=`
<p>To 亲爱的 ${userName}：</p>
<p>안녕하세요~ 我是Hyein！🐹</p>
<p>好久不见，大家最近过得好吗？我最近过得超～级幸福，因为……我的生日快到啦！</p>
<p>这一次，我想邀请我最爱的你们和我一起度过这个特别的日子！</p>
<p>你愿意来吗？我已经开始期待看到你们的笑容了！如果没有办法来也没关系，在远方为我送上祝福，我也会超级感动的！因为只要有Bunnies在，每一天都像生日一样幸福～</p>
<p>别忘了：请穿上带有紫色或波点元素的衣服哦～我们一起搭配，拍超好看的照片！</p>
<p>那我们那天见啦！不见不散！</p>
<p>사랑해요, Bunnies! 🫶🏻</p>
<p class="signature">Yours,<br>Hyein</p>
`;
}

/* 弹窗 */
function showPopup(){
    document.getElementById("popupText").innerText=userName+"，我们4.18广州见！💜";
    document.getElementById("popup").style.display="flex";
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
