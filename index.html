<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC&family=Playfair+Display&display=swap" rel="stylesheet">

<title>Hyein Dream Invitation</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:'Noto Serif SC',serif;
    background:#e8dbff;
}

/* 梦核背景 */
.bg{
    background:#e8dbff;
    position:relative;
}

.bg::after{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:radial-gradient(circle,#ffffff55 2px,transparent 2px);
    background-size:60px 60px;
    animation:move 25s linear infinite;
}

@keyframes move{
    from{transform:translateY(0)}
    to{transform:translateY(-200px)}
}

/* 页面 */
.page{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    transition:0.8s;
}

.hidden{
    transform:translateY(100%);
}

/* 封面 */
.cover img{
    width:100%;
    height:100%;
    object-fit:contain;
    background:#e8dbff;
}

/* 信封（放大梦核✨） */
.envelope{
    width:340px;
    height:220px;
    background:#ffffff;
    border-radius:16px;
    position:relative;
    cursor:pointer;
    box-shadow:0 20px 80px rgba(140,100,255,0.35);
}

.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#d8c5ff;
    clip-path:polygon(0 0,100% 0,50% 65%);
    transform-origin:top;
    transition:0.8s;
}

.open .flap{
    transform:rotateX(180deg);
}

/* 卡片 */
.card{
    width:92%;
    max-width:560px;
    background:rgba(255,255,255,0.88);
    backdrop-filter:blur(14px);
    border-radius:26px;
    padding:34px;
    box-shadow:0 10px 40px rgba(0,0,0,0.1);
}

/* 信件 */
.letter{
    font-size:18px;
    line-height:2.4;
    text-align:center;
    color:#3f2b7a;
}

.letter p{
    margin:18px 0;
}

.signature{
    margin-top:30px;
    text-align:right;
}

/* 按钮 */
.btn{
    margin-top:20px;
    padding:12px;
    width:70%;
    border:none;
    border-radius:25px;
    background:linear-gradient(135deg,#9b7bff,#c8b3ff);
    color:white;
    font-size:14px;
}
</style>
</head>

<body>

<audio id="music" src="music.mp3" loop></audio>

<!-- 封面 -->
<div class="page cover" id="page0" onclick="start()">
    <img src="cover.jpg">
</div>

<!-- 信封 -->
<div class="page bg hidden" id="page1">
    <div class="envelope" id="env" onclick="openEnvelope()">
        <div class="flap"></div>
    </div>
    <p style="color:#6d52d9;margin-top:20px;">点击打开邀请 💌</p>
</div>

<!-- 信件 -->
<div class="page bg hidden" id="page2" onclick="nextPage()">
    <div class="card letter" id="letter"></div>
</div>

<!-- 活动信息 -->
<div class="page bg hidden" id="page3" onclick="nextPage()">
    <div class="card">
        📍 广州 · 益+coffee&tea<br><br>
        📅 2026.04.18<br><br>
        💜 Hyein Birthday Event<br><br>
        Dress Code：紫色 / 波点<br><br>

        <a href="https://surl.amap.com/cYD2lgm1A9q1" target="_blank">
            <button class="btn">📍 点击导航</button>
        </a>
    </div>
</div>

<!-- RSVP -->
<div class="page bg hidden" id="page4">
    <div class="card" style="text-align:center;">
        💌 要来吗？<br><br>
        <button class="btn" onclick="alert('💜 等你来！')">我要来！</button>
    </div>
</div>

<script>
let current=0;
let userName="Bunnies";

/* 音乐淡入 */
function playMusic(){
    let a=document.getElementById("music");
    a.volume=0;
    a.play().catch(()=>{});
    let v=0;
    let fade=setInterval(()=>{
        if(v<1){
            v+=0.05;
            a.volume=v;
        }else clearInterval(fade);
    },200);
}

/* 开始 */
function start(){
    playMusic();
    nextPage();
}

/* 打开信封 */
function openEnvelope(){
    document.getElementById("env").classList.add("open");
    setTimeout(()=>{nextPage()},800);
}

/* 翻页 */
function nextPage(){
    document.getElementById("page"+current).classList.add("hidden");
    current++;
    document.getElementById("page"+current).classList.remove("hidden");
    updateLetter();
}

/* 信件内容（完整版💜） */
function updateLetter(){
document.getElementById("letter").innerHTML=`

<p>To 亲爱的 ${userName}：</p>

<p>안녕하세요~ 我是 Hyein！🐹</p>

<p>好久不见，大家最近过得好吗？</p>

<p>我最近过得超～级幸福，<br>
因为……我的生日快到啦！ 🎂✨</p>

<p>这一次，<br>
我想邀请我最爱的你们<br>
和我一起度过这个特别的日子 💜</p>

<p>你愿意来吗？<br>
我已经开始期待看到你们的笑容了！ 🥺💖</p>

<p>如果没有办法来也没关系，<br>
在远方为我送上祝福，<br>
我也会超级感动的！</p>

<p>因为只要有 Bunnies 在，<br>
每一天都像生日一样幸福～</p>

<p>别忘了：<br>
请穿上带有紫色或波点元素的衣服哦～<br>
我们一起拍超好看的照片！ 📸</p>

<p>那我们那天见啦！不见不散！</p>

<p>사랑해요, Bunnies! 🫶🏻</p>

<p class="signature">
Yours,<br>
Hyein
</p>

`;
}
</script>

</body>
</html>
