<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Hyein Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,500&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body,input,button{
    font-family:'Playfair Display','Noto Serif SC',serif;
    overflow:hidden;
}

/* 背景 */
.bg{
    position:fixed;
    width:100%;
    height:100vh;
    background:#d9c6ea;
}

.bg::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:radial-gradient(circle at 50% 40%, rgba(255,255,255,0.3), transparent 70%);
}

/* 波点 */
.dots{
    position:fixed;
    width:100%;
    height:100%;
    pointer-events:none;
}

.dots::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:
    radial-gradient(circle, rgba(255,255,255,0.95) 8.5px, transparent 9.5px);
    background-size:78px 78px;
    animation:breath1 5s ease-in-out infinite alternate;
}

.dots::after{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    transform:translate(35px,35px);
    background:
    radial-gradient(circle, rgba(255,255,255,0.85) 7.5px, transparent 8.5px);
    background-size:78px 78px;
    animation:breath2 6s ease-in-out infinite alternate;
}

@keyframes breath1{
    from{opacity:0.5;}
    to{opacity:1;}
}
@keyframes breath2{
    from{opacity:0.3;}
    to{opacity:0.9;}
}

/* 页面 */
.page{
    position:fixed;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    pointer-events:none;
    transition:0.6s;
}
.page.active{opacity:1;pointer-events:auto;}

/* 封面 */
.cover{
    width:95%;
    max-width:600px;
    border-radius:20px;
    filter:hue-rotate(260deg) saturate(0.7) brightness(1.1);
}

/* 标题 */
.title{
    font-size:58px;
    color:#caa6ff;
}

/* 输入 */
input{
    padding:18px;
    border-radius:20px;
    border:none;
    width:320px;
    text-align:center;
    font-size:20px;
    margin-top:20px;
    background:rgba(255,255,255,0.6);
}

/* 按钮 */
button{
    margin-top:20px;
    padding:12px 34px;
    border:none;
    background:rgba(200,160,255,0.6);
    color:#fff;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
}
button:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px rgba(180,120,255,0.6);
}

/* 信封 */
.envelope{
    width:420px;height:240px;
    position:relative;
    cursor:pointer;
}

/* 紫色三角 */
.envelope::before{
    content:"";
    position:absolute;
    top:-55px;
    left:50%;
    transform:translateX(-50%);
    border-left:36px solid transparent;
    border-right:36px solid transparent;
    border-bottom:46px solid rgba(180,120,255,0.45);
    filter:blur(2px);
    opacity:0.7;
}

.flap{
    position:absolute;
    width:100%;height:100%;
    background:#e6ccff;
    clip-path:polygon(0 0,100% 0,50% 60%);
    transform-origin:top;
    transition:0.6s;
}
.envelope.open .flap{
    transform:rotateX(180deg);
}

.body{
    position:absolute;
    width:100%;height:100%;
    background:white;
    border-radius:12px;
}

/* 信件（无滚动） */
#p4{padding:20px;}

.letter{
    width:92%;
    max-width:600px;
    background:rgba(255,255,255,0.65);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:28px 30px;
    font-size:18px;
    line-height:2;
    overflow:hidden;
    max-height:90vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

/* 卡片 */
.card{
    width:88%;
    max-width:480px;
    padding:28px;
    background:rgba(255,255,255,0.55);
    backdrop-filter:blur(18px);
    border-radius:22px;
    text-align:center;
}

/* 地图 */
.map{
    display:inline-block;
    padding:8px 18px;
    border-radius:20px;
    color:#8c5cff;
    cursor:pointer;
    transition:0.3s;
}
.map:hover{
    box-shadow:0 0 15px rgba(180,120,255,0.6);
}

/* 爱心 */
.heart{
    position:fixed;
    animation:fly 1.8s ease-out forwards;
}
@keyframes fly{
    to{transform:translateY(-150px);opacity:0;}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="dots"></div>

<audio id="music" src="music.mp3" loop></audio>

<!-- 封面 -->
<div class="page active" id="p1" onclick="nextPage()">
<img src="cover.jpg" class="cover">
</div>

<!-- 输入 -->
<div class="page" id="p2">
<div class="title">Invitation</div>
<input id="name" placeholder="Your Name">
<button onclick="go()">OK</button>
</div>

<!-- 信封 -->
<div class="page" id="p3">
<div class="envelope" onclick="openEnvelope(this)">
<div class="flap"></div>
<div class="body"></div>
</div>
</div>

<!-- 信件 -->
<div class="page" id="p4" onclick="nextPage()">
<div class="letter" id="letter" onclick="event.stopPropagation()"></div>
</div>

<!-- 信息 -->
<div class="page" id="p5">
<div class="card">
💜  Happy Hyein's Day  💜<br>
📅 2026.04.18<br>
📍 <span class="map" onclick="goMap()">益+coffee&tea</span><br>
Dress Code：紫色 / 波点<br>
<button onclick="confirmAttend()">我要来！</button>
</div>
</div>

<script>
let page=1;
let userName="Bunnies";
let opened=false;
let musicStarted=false;

function nextPage(){
if(!musicStarted){
let music=document.getElementById("music");
music.volume=0.4;
music.play().catch(()=>{});
musicStarted=true;
}

document.getElementById("p"+page).classList.remove("active");
page++;
document.getElementById("p"+page).classList.add("active");

updateLetter();
}

function go(){
let name=document.getElementById("name").value;
if(name) userName=name;
nextPage();
}

function openEnvelope(el){
if(!opened){
el.classList.add("open");
opened=true;
}else{
nextPage();
}
}

/* 💌 完整信件（恢复版） */
function updateLetter(){
document.getElementById("letter").innerHTML = `
<p>To 亲爱的 ${userName}：</p>
<p>안녕하세요~ 我是Hyein！🐹</p>
<p>好久不见，大家最近过得好吗？我最近过得超～级幸福，因为……我的生日快到啦！🎂✨</p>
<p>这一次，我想邀请我最爱的你们和我一起度过这个特别的日子！你愿意来吗？我已经开始期待看到你们的笑容了！🥺💖</p>
<p>如果没有办法来也没关系，只要为我送上祝福，我都会超级感动的！因为只要有Bunnies在，每一天都像生日一样幸福～</p>
<p>别忘了：请穿上带有紫色或波点元素的衣服哦～我们一起拍超好看的照片！</p>
<p>那我们那天见啦！不见不散！</p>
<p>사랑해요, Bunnies! 🫶🏻</p>
<p style="text-align:right;margin-top:20px;">Yours,<br>Hyein</p>
`;
}

function goMap(){
window.open("https://surl.amap.com/cYD2lgm1A9q1");
}

function confirmAttend(){
alert("💜 "+userName+" 我们4.18见！");
}
</script>

</body>
</html>
